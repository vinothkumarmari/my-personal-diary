  <style>

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // PDF.js worker
    if (window.pdfjsLib) {

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ==================== FIREBASE HELPER ====================
    function useFirestore(userId) {
      const getCollection = (name) => db.collection('users').doc(userId).collection(name);

      const loadEntries = async () => {
        const snap = await getCollection('entries').orderBy('createdAt', 'desc').get();
        return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      };

      const saveEntry = async (entry) => {
        const ref = await getCollection('entries').add({ ...entry, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        return ref.id;
      };

      const deleteEntry = async (id) => { await getCollection('entries').doc(id).delete(); };

      const loadBooks = async () => {
        const snap = await getCollection('books').orderBy('addedAt', 'desc').get();
        return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      };

      const saveBook = async (book, onProgress) => {
        const meta = { name: book.name, totalPages: book.totalPages, lastPage: book.lastPage || 0, addedDate: book.addedDate, addedAt: firebase.firestore.FieldValue.serverTimestamp() };
        const ref = await getCollection('books').add(meta);
        // Store PDF binary as base64 chunks (each < 900KB for Firestore 1MB limit)
        const base64 = book.pdfBase64;
        const chunkLen = 700000; // ~700KB per chunk
        const totalChunks = Math.ceil(base64.length / chunkLen);
        for (let i = 0; i < totalChunks; i++) {
          await getCollection('books').doc(ref.id).collection('pdfdata').doc('chunk_' + i).set({
            index: i, data: base64.slice(i * chunkLen, (i + 1) * chunkLen)
          });
          if (onProgress) onProgress(Math.round(((i + 1) / totalChunks) * 100));
        }
        return ref.id;
      };

      const loadBookPdf = async (bookId) => {
        const snap = await getCollection('books').doc(bookId).collection('pdfdata').get();
        const sorted = snap.docs.sort((a, b) => a.data().index - b.data().index);
        const base64 = sorted.map(doc => doc.data().data).join('');
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes.buffer;
      };

      const updateBookProgress = async (bookId, lastPage) => { await getCollection('books').doc(bookId).update({ lastPage }); };

      const deleteBook = async (bookId) => {
        const pages = await getCollection('books').doc(bookId).collection('pdfdata').get();
        const batch = db.batch();
        pages.docs.forEach(doc => batch.delete(doc.ref));
        batch.delete(getCollection('books').doc(bookId));
        await batch.commit();
      };

      const loadDrawings = async () => {
        const snap = await getCollection('drawings').orderBy('createdAt', 'desc').get();
        return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      };

      const saveDrawing = async (drawing) => {
        const ref = await getCollection('drawings').add({ ...drawing, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        return ref.id;
      };

      const deleteDrawing = async (id) => { await getCollection('drawings').doc(id).delete(); };

      return { loadEntries, saveEntry, deleteEntry, loadBooks, saveBook, loadBookPdf, updateBookProgress, deleteBook, loadDrawings, saveDrawing, deleteDrawing };
    }

    // ==================== SYNC INDICATOR ====================
    function SyncIndicator({ status }) {
      if (!status) return null;
      const info = { syncing: { bg: '#f59e0b', text: '☁️ Syncing...' }, synced: { bg: '#1D9E75', text: '✅ Synced' }, error: { bg: '#e24b4a', text: '❌ Sync Error' } };
      const s = info[status] || info.synced;
      return <div className="sync-indicator" style={{ background: s.bg, color: 'white', opacity: status === 'synced' ? 0.8 : 1 }}>{status === 'syncing' && <span className="loading-spinner" style={{ width: 14, height: 14, marginRight: 6, verticalAlign: 'middle' }}></span>}{s.text}</div>;
    }

    // ==================== DRAWING COMPONENT (Advanced) ====================
    function DrawingCanvas({ darkMode, userId }) {
      const canvasRef = useRef(null);
      const overlayRef = useRef(null);
      const [tool, setTool] = useState('brush');
      const [brushColor, setBrushColor] = useState('#000000');
      const [fillColor, setFillColor] = useState('#3b82f6');
      const [brushSize, setBrushSize] = useState(4);
      const [shapeType, setShapeType] = useState('rect');
      const [fontFamily, setFontFamily] = useState('Arial');
      const [fontSize, setFontSize] = useState(24);
      const [fontStyle, setFontStyle] = useState('normal'); // normal, bold, italic
      const [textInput, setTextInput] = useState('');
      const [textPos, setTextPos] = useState(null);
      const [showShapeMenu, setShowShapeMenu] = useState(false);
      const [showFontMenu, setShowFontMenu] = useState(false);
      const [drawings, setDrawings] = useState([]);
      const [currentDrawingName, setCurrentDrawingName] = useState('');
      const [showSaved, setShowSaved] = useState(false);
      const [syncing, setSyncing] = useState(null);
      const [loading, setLoading] = useState(true);
      const [selectedObj, setSelectedObj] = useState(null);
      const [rotating, setRotating] = useState(false);

      const historyRef = useRef([]);
      const redoRef = useRef([]);
      const objectsRef = useRef([]);
      const dragRef = useRef(null);
      const drawStartRef = useRef(null);
      const firestore = useFirestore(userId);

      const colors = ['#000000','#e24b4a','#1D9E75','#3b82f6','#f59e0b','#8b5cf6','#ec4899','#f97316','#06b6d4','#84cc16','#6b7280','#ffffff'];
      const fonts = ['Arial','Georgia','Times New Roman','Courier New','Verdana','Comic Sans MS','Impact','Trebuchet MS','EB Garamond'];
      const shapes = [
        { id: 'rect', icon: '▭', label: 'Rectangle' },
        { id: 'circle', icon: '○', label: 'Circle' },
        { id: 'ellipse', icon: '⬭', label: 'Ellipse' },
        { id: 'triangle', icon: '△', label: 'Triangle' },
        { id: 'line', icon: '╱', label: 'Line' },
        { id: 'arrow', icon: '→', label: 'Arrow' },
        { id: 'star', icon: '☆', label: 'Star' },
        { id: 'diamond', icon: '◇', label: 'Diamond' },
        { id: 'pentagon', icon: '⬠', label: 'Pentagon' },
        { id: 'hexagon', icon: '⬡', label: 'Hexagon' },
        { id: 'heart', icon: '♡', label: 'Heart' },
        { id: 'roundRect', icon: '▢', label: 'Rounded Rect' },
      ];

      // --- Canvas helpers ---
      const getXY = (e) => {
        const c = canvasRef.current, r = c.getBoundingClientRect();
        const sx = c.width / r.width, sy = c.height / r.height;
        const pt = e.touches ? e.touches[0] : e;
        return { x: (pt.clientX - r.left) * sx, y: (pt.clientY - r.top) * sy };
      };

      const saveHistory = () => {
        const c = canvasRef.current;
        historyRef.current.push(c.toDataURL());
        if (historyRef.current.length > 50) historyRef.current.shift();
        redoRef.current = [];
      };

      const undo = () => {
        if (historyRef.current.length === 0) return;
        const c = canvasRef.current, ctx = c.getContext('2d');
        redoRef.current.push(c.toDataURL());
        const prev = historyRef.current.pop();
        const img = new Image(); img.onload = () => { ctx.clearRect(0, 0, c.width, c.height); ctx.drawImage(img, 0, 0); }; img.src = prev;
        // Also remove last object
        objectsRef.current.pop();
        setSelectedObj(null);
      };

      const redo = () => {
        if (redoRef.current.length === 0) return;
        const c = canvasRef.current, ctx = c.getContext('2d');
        historyRef.current.push(c.toDataURL());
        const next = redoRef.current.pop();
        const img = new Image(); img.onload = () => { ctx.clearRect(0, 0, c.width, c.height); ctx.drawImage(img, 0, 0); }; img.src = next;
      };

      // --- Draw shape path on context ---
      const drawShapePath = (ctx, type, x, y, w, h) => {
        ctx.beginPath();
        if (type === 'rect') { ctx.rect(x, y, w, h); }
        else if (type === 'roundRect') { const r = Math.min(Math.abs(w), Math.abs(h)) * 0.2; ctx.roundRect(x, y, w, h, r); }
        else if (type === 'circle') { const r = Math.max(Math.abs(w), Math.abs(h)) / 2; ctx.arc(x + w/2, y + h/2, r, 0, Math.PI*2); }
        else if (type === 'ellipse') { ctx.ellipse(x + w/2, y + h/2, Math.abs(w/2), Math.abs(h/2), 0, 0, Math.PI*2); }
        else if (type === 'triangle') { ctx.moveTo(x + w/2, y); ctx.lineTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.closePath(); }
        else if (type === 'diamond') { ctx.moveTo(x + w/2, y); ctx.lineTo(x + w, y + h/2); ctx.lineTo(x + w/2, y + h); ctx.lineTo(x, y + h/2); ctx.closePath(); }
        else if (type === 'pentagon') { for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;ctx.lineTo(x+w/2+w/2*Math.cos(a),y+h/2+h/2*Math.sin(a));}ctx.closePath(); }
        else if (type === 'hexagon') { for(let i=0;i<6;i++){const a=-Math.PI/2+i*2*Math.PI/6;ctx.lineTo(x+w/2+w/2*Math.cos(a),y+h/2+h/2*Math.sin(a));}ctx.closePath(); }
        else if (type === 'star') { for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5;const r2=i%2===0?Math.min(Math.abs(w),Math.abs(h))/2:Math.min(Math.abs(w),Math.abs(h))/4.5;ctx.lineTo(x+w/2+r2*Math.cos(a),y+h/2+r2*Math.sin(a));}ctx.closePath(); }
        else if (type === 'heart') { const cx2=x+w/2,cy2=y+h*0.3;ctx.moveTo(cx2,y+h);ctx.bezierCurveTo(x-w*0.1,y+h*0.4,x,y-h*0.1,cx2,cy2);ctx.bezierCurveTo(x+w,y-h*0.1,x+w*1.1,y+h*0.4,cx2,y+h); }
        else if (type === 'line') { ctx.moveTo(x, y); ctx.lineTo(x + w, y + h); }
        else if (type === 'arrow') { ctx.moveTo(x, y); ctx.lineTo(x + w, y + h); const angle = Math.atan2(h, w); const hl = 15; ctx.moveTo(x+w, y+h); ctx.lineTo(x+w-hl*Math.cos(angle-0.4), y+h-hl*Math.sin(angle-0.4)); ctx.moveTo(x+w, y+h); ctx.lineTo(x+w-hl*Math.cos(angle+0.4), y+h-hl*Math.sin(angle+0.4)); }
      };

      // --- Flood fill (paint bucket) ---
      const floodFill = (sx, sy, fillCol) => {
        const c = canvasRef.current, ctx = c.getContext('2d');
        const imgData = ctx.getImageData(0, 0, c.width, c.height);
        const data = imgData.data;
        const w = c.width, h = c.height;
        const px = Math.round(sx), py = Math.round(sy);
        if (px < 0 || px >= w || py < 0 || py >= h) return;
        const idx = (py * w + px) * 4;
        const tr = data[idx], tg = data[idx+1], tb = data[idx+2], ta = data[idx+3];
        // Parse fill color
        const tmp = document.createElement('canvas'); tmp.width = 1; tmp.height = 1;
        const tc = tmp.getContext('2d'); tc.fillStyle = fillCol; tc.fillRect(0,0,1,1);
        const fd = tc.getImageData(0,0,1,1).data;
        const fr = fd[0], fg = fd[1], fb = fd[2];
        if (tr === fr && tg === fg && tb === fb) return; // same color
        const tolerance = 32;
        const match = (i) => Math.abs(data[i]-tr)<=tolerance && Math.abs(data[i+1]-tg)<=tolerance && Math.abs(data[i+2]-tb)<=tolerance && Math.abs(data[i+3]-ta)<=tolerance;
        const stack = [[px, py]];
        const visited = new Uint8Array(w * h);
        while (stack.length > 0) {
          const [cx2, cy2] = stack.pop();
          const ci = (cy2 * w + cx2) * 4;
          if (cx2 < 0 || cx2 >= w || cy2 < 0 || cy2 >= h) continue;
          if (visited[cy2 * w + cx2]) continue;
          if (!match(ci)) continue;
          visited[cy2 * w + cx2] = 1;
          data[ci] = fr; data[ci+1] = fg; data[ci+2] = fb; data[ci+3] = 255;
          stack.push([cx2+1,cy2],[cx2-1,cy2],[cx2,cy2+1],[cx2,cy2-1]);
        }
        ctx.putImageData(imgData, 0, 0);
      };

      // --- Render all objects on canvas ---
      const renderCanvas = () => {
        const c = canvasRef.current, ctx = c.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, c.width, c.height);
        objectsRef.current.forEach((obj, i) => {
          ctx.save();
          if (obj.rotation) { ctx.translate(obj.x + obj.w/2, obj.y + obj.h/2); ctx.rotate(obj.rotation); ctx.translate(-(obj.x + obj.w/2), -(obj.y + obj.h/2)); }
          if (obj.type === 'image') {
            ctx.drawImage(obj.img, 0, 0, obj.img.width, obj.img.height, obj.x, obj.y, obj.w, obj.h);
          } else if (obj.type === 'freehand') {
            ctx.strokeStyle = obj.color; ctx.lineWidth = obj.size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath();
            obj.points.forEach((p, j) => { if (j === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
            ctx.stroke();
          } else if (obj.type === 'text') {
            const style = (obj.fontStyle === 'bold' ? 'bold ' : obj.fontStyle === 'italic' ? 'italic ' : '') + obj.fontSize + 'px ' + obj.fontFamily;
            ctx.font = style; ctx.fillStyle = obj.color; ctx.fillText(obj.text, obj.x, obj.y + obj.fontSize);
          } else if (obj.type === 'shape') {
            drawShapePath(ctx, obj.shape, obj.x, obj.y, obj.w, obj.h);
            if (obj.filled) { ctx.fillStyle = obj.fillColor; ctx.fill(); }
            ctx.strokeStyle = obj.color; ctx.lineWidth = obj.size; ctx.stroke();
          }
          ctx.restore();
        });
        // Draw selection handles
        if (selectedObj !== null && objectsRef.current[selectedObj]) {
          const obj = objectsRef.current[selectedObj];
          ctx.save();
          ctx.strokeStyle = '#1D9E75'; ctx.lineWidth = 1.5; ctx.setLineDash([5,3]);
          ctx.strokeRect(obj.x - 4, obj.y - 4, (obj.w || 100) + 8, (obj.h || 30) + 8);
          ctx.setLineDash([]);
          // Rotate handle
          const cx2 = obj.x + (obj.w || 100) / 2, top2 = obj.y - 24;
          ctx.beginPath(); ctx.arc(cx2, top2, 7, 0, Math.PI*2); ctx.fillStyle = '#1D9E75'; ctx.fill();
          ctx.fillStyle = 'white'; ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.fillText('↻', cx2, top2 + 3.5);
          ctx.restore();
        }
      };

      useEffect(() => {
        (async () => { try { setDrawings(await firestore.loadDrawings()); } catch(e) { console.error(e); } setLoading(false); })();
        const c = canvasRef.current;
        if (c) { const ctx = c.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, c.width, c.height); }
      }, []);

      // --- Pointer handlers ---
      const handleDown = (e) => {
        e.preventDefault();
        const p = getXY(e);
        setShowShapeMenu(false); setShowFontMenu(false);

        if (tool === 'select') {
          // Check rotate handle first
          if (selectedObj !== null && objectsRef.current[selectedObj]) {
            const obj = objectsRef.current[selectedObj];
            const cx2 = obj.x + (obj.w||100)/2, top2 = obj.y - 24;
            if (Math.hypot(p.x - cx2, p.y - top2) < 14) { setRotating(true); dragRef.current = { ox: p.x, oy: p.y }; return; }
          }
          // Hit test objects (reverse order = top first)
          let found = -1;
          for (let i = objectsRef.current.length - 1; i >= 0; i--) {
            const o = objectsRef.current[i];
            if (p.x >= o.x && p.x <= o.x + (o.w||100) && p.y >= o.y && p.y <= o.y + (o.h||30)) { found = i; break; }
          }
          if (found >= 0) {
            setSelectedObj(found);
            dragRef.current = { idx: found, ox: p.x - objectsRef.current[found].x, oy: p.y - objectsRef.current[found].y };
          } else { setSelectedObj(null); }
          renderCanvas();
          return;
        }

        if (tool === 'fill') { saveHistory(); floodFill(p.x, p.y, fillColor); return; }

        if (tool === 'text') { setTextPos(p); return; }

        saveHistory();
        if (tool === 'brush' || tool === 'eraser') {
          const c = canvasRef.current, ctx = c.getContext('2d');
          const newObj = { type: 'freehand', color: tool === 'eraser' ? '#ffffff' : brushColor, size: tool === 'eraser' ? brushSize*3 : brushSize, points: [p], x: p.x, y: p.y, w: 0, h: 0, rotation: 0 };
          objectsRef.current.push(newObj);
          drawStartRef.current = { tool: 'freehand', idx: objectsRef.current.length - 1 };
          ctx.beginPath(); ctx.moveTo(p.x, p.y);
          ctx.strokeStyle = newObj.color; ctx.lineWidth = newObj.size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        } else if (tool === 'shape') {
          drawStartRef.current = { tool: 'shape', sx: p.x, sy: p.y };
        }
      };

      const handleMove = (e) => {
        e.preventDefault();
        const p = getXY(e);

        if (rotating && selectedObj !== null) {
          const obj = objectsRef.current[selectedObj];
          const cx2 = obj.x + (obj.w||100)/2, cy2 = obj.y + (obj.h||30)/2;
          obj.rotation = Math.atan2(p.y - cy2, p.x - cx2) + Math.PI/2;
          renderCanvas(); return;
        }

        if (tool === 'select' && dragRef.current && dragRef.current.idx !== undefined) {
          const obj = objectsRef.current[dragRef.current.idx];
          obj.x = p.x - dragRef.current.ox;
          obj.y = p.y - dragRef.current.oy;
          renderCanvas(); return;
        }

        if (!drawStartRef.current) return;

        if (drawStartRef.current.tool === 'freehand') {
          const obj = objectsRef.current[drawStartRef.current.idx];
          obj.points.push(p);
          const c = canvasRef.current, ctx = c.getContext('2d');
          const pressure = e.pressure !== undefined ? e.pressure : 0.5;
          ctx.lineTo(p.x, p.y);
          ctx.lineWidth = obj.size * (0.4 + pressure * 0.6);
          ctx.stroke();
          // Update bounds
          obj.x = Math.min(obj.x, p.x); obj.y = Math.min(obj.y, p.y);
          obj.w = Math.max(obj.w, p.x - obj.x); obj.h = Math.max(obj.h, p.y - obj.y);
        } else if (drawStartRef.current.tool === 'shape') {
          // Preview shape on overlay
          const oc = overlayRef.current;
          if (!oc) return;
          const ctx2 = oc.getContext('2d');
          ctx2.clearRect(0, 0, oc.width, oc.height);
          const sx = drawStartRef.current.sx, sy = drawStartRef.current.sy;
          const w = p.x - sx, h = p.y - sy;
          ctx2.strokeStyle = brushColor; ctx2.lineWidth = brushSize; ctx2.lineCap = 'round';
          drawShapePath(ctx2, shapeType, sx, sy, w, h);
          ctx2.stroke();
        }
      };

      const handleUp = () => {
        if (rotating) { setRotating(false); dragRef.current = null; return; }
        if (tool === 'select') { dragRef.current = null; return; }
        if (drawStartRef.current && drawStartRef.current.tool === 'shape') {
          // Commit shape preview to canvas
          const oc = overlayRef.current;
          if (oc) {
            const ctx2 = oc.getContext('2d');
            const imgD = ctx2.getImageData(0, 0, oc.width, oc.height);
            // Check if anything was drawn
            const sx = drawStartRef.current.sx, sy = drawStartRef.current.sy;
            const p = getLastPoint();
            const w = (p?.x || sx) - sx, h = (p?.y || sy) - sy;
            if (Math.abs(w) > 3 || Math.abs(h) > 3) {
              const obj = { type: 'shape', shape: shapeType, x: Math.min(sx, sx+w), y: Math.min(sy, sy+h), w: Math.abs(w), h: Math.abs(h), color: brushColor, fillColor, filled: false, size: brushSize, rotation: 0 };
              objectsRef.current.push(obj);
              renderCanvas();
            }
            ctx2.clearRect(0, 0, oc.width, oc.height);
          }
        }
        if (drawStartRef.current && drawStartRef.current.tool === 'freehand') {
          // Bounds already updated
        }
        drawStartRef.current = null;
      };

      const lastPointRef = useRef(null);
      const getLastPoint = () => lastPointRef.current;
      // Track last point in move
      const wrappedMove = (e) => {
        const p = getXY(e);
        lastPointRef.current = p;
        handleMove(e);
      };

      // --- Text commit ---
      const commitText = () => {
        if (!textPos || !textInput.trim()) { setTextPos(null); setTextInput(''); return; }
        saveHistory();
        const c = canvasRef.current, ctx = c.getContext('2d');
        const style = (fontStyle === 'bold' ? 'bold ' : fontStyle === 'italic' ? 'italic ' : '') + fontSize + 'px ' + fontFamily;
        ctx.font = style;
        const m = ctx.measureText(textInput);
        const obj = { type: 'text', text: textInput, x: textPos.x, y: textPos.y, w: m.width, h: fontSize + 4, color: brushColor, fontFamily, fontSize, fontStyle, rotation: 0 };
        objectsRef.current.push(obj);
        renderCanvas();
        setTextPos(null); setTextInput('');
      };

      // --- Fill selected shape ---
      const fillSelected = () => {
        if (selectedObj === null) return;
        const obj = objectsRef.current[selectedObj];
        if (obj.type === 'shape') { saveHistory(); obj.filled = !obj.filled; obj.fillColor = fillColor; renderCanvas(); }
      };

      // --- Delete selected ---
      const deleteSelected = () => {
        if (selectedObj === null) return;
        saveHistory();
        objectsRef.current.splice(selectedObj, 1);
        setSelectedObj(null);
        renderCanvas();
      };

      const clearCanvas = () => { saveHistory(); objectsRef.current = []; setSelectedObj(null); const c = canvasRef.current, ctx = c.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, c.width, c.height); };

      const saveDrawing = async () => {
        renderCanvas(); // ensure clean render (no selection handles)
        setSelectedObj(null);
        setTimeout(async () => {
          const c = canvasRef.current;
          const name = currentDrawingName.trim() || 'Drawing ' + (drawings.length + 1);
          const img = c.toDataURL('image/png', 0.6);
          const d = { name, image: img, date: new Date().toLocaleString() };
          setSyncing('syncing');
          try { const id = await firestore.saveDrawing(d); setDrawings([{ id, ...d }, ...drawings]); setCurrentDrawingName(''); setSyncing('synced'); setTimeout(() => setSyncing(null), 2000); }
          catch (err) { console.error(err); setSyncing('error'); }
        }, 50);
      };

      const loadDrawing = (d) => { const c = canvasRef.current, ctx = c.getContext('2d'); const img = new Image(); img.onload = () => { ctx.clearRect(0, 0, c.width, c.height); ctx.drawImage(img, 0, 0); objectsRef.current = [{ type: 'image', img, x: 0, y: 0, w: c.width, h: c.height, rotation: 0 }]; }; img.src = d.image; setShowSaved(false); };
      const handleDeleteDrawing = async (id) => { setSyncing('syncing'); try { await firestore.deleteDrawing(id); setDrawings(drawings.filter(d2 => d2.id !== id)); setSyncing('synced'); setTimeout(() => setSyncing(null), 2000); } catch(err) { setSyncing('error'); } };
      const downloadDrawing = () => { setSelectedObj(null); setTimeout(() => { renderCanvas(); const link = document.createElement('a'); link.download = (currentDrawingName || 'my-drawing') + '.png'; link.href = canvasRef.current.toDataURL('image/png'); link.click(); }, 50); };

      const cursorStyle = tool === 'eraser' ? 'cell' : tool === 'fill' ? 'crosshair' : tool === 'text' ? 'text' : tool === 'select' ? 'default' : 'crosshair';

      const ToolBtn = ({ t, icon, label }) => (
        <button className={'dtool-btn' + (tool === t ? ' active' : '')}
          style={{ background: tool === t ? '#1D9E75' : (darkMode ? '#444' : '#f0f0f0'), color: tool === t ? 'white' : (darkMode ? '#ccc' : '#333') }}
          onClick={() => { setTool(t); setSelectedObj(null); setShowShapeMenu(false); setShowFontMenu(false); }}
          title={label}>{icon}</button>
      );

      if (loading) return <div style={{ textAlign: 'center', padding: '3rem' }}><div className="loading-spinner" style={{ borderColor: 'rgba(29,158,117,0.3)', borderTopColor: '#1D9E75', width: 40, height: 40 }}></div><p style={{ marginTop: '1rem', color: darkMode ? '#aaa' : '#888' }}>Loading drawings...</p></div>;

      return (
        <div>
          <SyncIndicator status={syncing} />
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
            <h2 style={{ fontSize: '1.25rem', color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>🎨 Drawing Pad</h2>
            <button onClick={() => setShowSaved(!showSaved)} style={{ padding: '8px 16px', background: showSaved ? '#1D9E75' : 'transparent', color: showSaved ? 'white' : (darkMode ? '#ccc' : '#5f5e5a'), border: '1px solid ' + (showSaved ? '#1D9E75' : (darkMode ? '#555' : '#d3d1c7')), borderRadius: '6px', cursor: 'pointer', fontSize: '13px' }}>{showSaved ? '✏️ Draw' : '📁 Saved (' + drawings.length + ')'}</button>
          </div>
          {showSaved ? (
            drawings.length === 0 ? <div style={{ textAlign: 'center', padding: '3rem', color: darkMode ? '#aaa' : '#888' }}><p style={{ fontSize: '48px', marginBottom: '1rem' }}>🎨</p><p>No saved drawings yet.</p></div>
            : <div className="saved-drawings-grid">{drawings.map(d => (
              <div key={d.id} className="saved-drawing-item" style={{ background: darkMode ? '#333' : '#fff' }}>
                <img src={d.image} alt={d.name} onClick={() => loadDrawing(d)} />
                <div style={{ padding: '10px' }}>
                  <p style={{ fontSize: '13px', fontWeight: '500', color: darkMode ? '#f5f5f5' : '#2c2c2a', marginBottom: '4px' }}>{d.name}</p>
                  <p style={{ fontSize: '11px', color: darkMode ? '#888' : '#aaa', marginBottom: '8px' }}>{d.date}</p>
                  <button onClick={() => handleDeleteDrawing(d.id)} style={{ padding: '4px 8px', background: '#e24b4a', color: 'white', border: 'none', borderRadius: '4px', fontSize: '11px', cursor: 'pointer' }}>Delete</button>
                </div>
              </div>
            ))}</div>
          ) : (
            <div className="drawing-canvas-container">
              {/* Toolbar Row 1: Tools */}
              <div className="drawing-toolbar" style={{ background: darkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)' }}>
                <div className="drawing-toolbar-section">
                  <ToolBtn t="brush" icon="✏️" label="Brush" />
                  <ToolBtn t="eraser" icon="🧹" label="Eraser" />
                  <ToolBtn t="select" icon="👆" label="Select/Move" />
                </div>
                <div className="drawing-toolbar-section" style={{ position: 'relative' }}>
                  <button className={'dtool-btn' + (tool === 'shape' ? ' active' : '')}
                    style={{ background: tool === 'shape' ? '#1D9E75' : (darkMode ? '#444' : '#f0f0f0'), color: tool === 'shape' ? 'white' : (darkMode ? '#ccc' : '#333') }}
                    onClick={() => { setTool('shape'); setShowShapeMenu(!showShapeMenu); setShowFontMenu(false); }}>
                    {shapes.find(s => s.id === shapeType)?.icon || '▭'} Shapes ▾
                  </button>
                  {showShapeMenu && <div className="shape-dropdown" style={{ background: darkMode ? '#333' : 'white', borderColor: darkMode ? '#555' : '#d3d1c7' }}>
                    {shapes.map(s => <button key={s.id} onClick={() => { setShapeType(s.id); setShowShapeMenu(false); setTool('shape'); }} title={s.label} style={{ color: darkMode ? '#eee' : '#333', background: shapeType === s.id ? (darkMode ? '#1D9E75' : '#e8f5e9') : 'transparent' }}>{s.icon}</button>)}
                  </div>}
                </div>
                <div className="drawing-toolbar-section" style={{ position: 'relative' }}>
                  <button className={'dtool-btn' + (tool === 'text' ? ' active' : '')}
                    style={{ background: tool === 'text' ? '#1D9E75' : (darkMode ? '#444' : '#f0f0f0'), color: tool === 'text' ? 'white' : (darkMode ? '#ccc' : '#333') }}
                    onClick={() => { setTool('text'); setShowFontMenu(!showFontMenu); setShowShapeMenu(false); }}>
                    🔤 Text ▾
                  </button>
                  {showFontMenu && <div className="font-dropdown" style={{ background: darkMode ? '#333' : 'white', borderColor: darkMode ? '#555' : '#d3d1c7' }}>
                    {fonts.map(f => <button key={f} onClick={() => { setFontFamily(f); setShowFontMenu(false); }} style={{ fontFamily: f, color: darkMode ? '#eee' : '#333', background: fontFamily === f ? (darkMode ? '#1D9E75' : '#e8f5e9') : 'transparent' }}>{f}</button>)}
                    <div style={{ padding: '6px 8px', borderTop: '1px solid ' + (darkMode ? '#555' : '#eee'), display: 'flex', gap: 4, marginTop: 4 }}>
                      {['normal','bold','italic'].map(s => <button key={s} className={'dtool-btn' + (fontStyle === s ? ' active' : '')} style={{ flex:1, background: fontStyle===s?'#1D9E75':(darkMode?'#444':'#f0f0f0'), color: fontStyle===s?'white':(darkMode?'#ccc':'#333'), fontStyle: s==='italic'?'italic':'normal', fontWeight: s==='bold'?'bold':'normal' }} onClick={() => setFontStyle(s)}>{s==='normal'?'N':s==='bold'?'B':'I'}</button>)}
                    </div>
                    <div style={{ padding: '6px 8px', display: 'flex', alignItems: 'center', gap: 6 }}>
                      <span style={{ fontSize: 11, color: darkMode ? '#aaa' : '#888' }}>Size:</span>
                      <input type="range" min="12" max="72" value={fontSize} onChange={e => setFontSize(+e.target.value)} style={{ flex: 1 }} />
                      <span style={{ fontSize: 11, color: darkMode ? '#aaa' : '#888', minWidth: 20 }}>{fontSize}</span>
                    </div>
                  </div>}
                </div>
                <div className="drawing-toolbar-section">
                  <ToolBtn t="fill" icon="🪣" label="Fill" />
                </div>
                <div className="drawing-toolbar-section">
                  <button className="dtool-btn" style={{ background: darkMode ? '#444' : '#f0f0f0', color: darkMode ? '#ccc' : '#333' }} onClick={undo} title="Undo">↩️</button>
                  <button className="dtool-btn" style={{ background: darkMode ? '#444' : '#f0f0f0', color: darkMode ? '#ccc' : '#333' }} onClick={redo} title="Redo">↪️</button>
                  <button className="dtool-btn" style={{ background: darkMode ? '#444' : '#f0f0f0', color: darkMode ? '#ccc' : '#333' }} onClick={deleteSelected} title="Delete Selected" disabled={selectedObj===null}>🗑️</button>
                  {selectedObj !== null && objectsRef.current[selectedObj]?.type === 'shape' && (
                    <button className="dtool-btn" style={{ background: objectsRef.current[selectedObj]?.filled ? '#1D9E75' : (darkMode ? '#444' : '#f0f0f0'), color: objectsRef.current[selectedObj]?.filled ? 'white' : (darkMode ? '#ccc' : '#333') }} onClick={fillSelected} title="Toggle Fill">🎨 Fill</button>
                  )}
                  <button className="dtool-btn" style={{ background: darkMode ? '#444' : '#f0f0f0', color: darkMode ? '#ccc' : '#333' }} onClick={clearCanvas} title="Clear All">🗑️ All</button>
                </div>
              </div>
              {/* Toolbar Row 2: Colors & Size */}
              <div className="drawing-toolbar" style={{ background: darkMode ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.015)', borderBottom: '1px solid ' + (darkMode ? '#444' : '#e0ddd5') }}>
                <div className="drawing-toolbar-section">
                  <span style={{ fontSize: 11, color: darkMode ? '#aaa' : '#888' }}>Stroke:</span>
                  <div className="color-picker-container">
                    {colors.map(c => <div key={c} className={'color-swatch ' + (brushColor === c ? 'active' : '')} style={{ backgroundColor: c, border: c === '#ffffff' ? '1px solid #ccc' : 'none' }} onClick={() => setBrushColor(c)} />)}
                    <input type="color" value={brushColor} onChange={e => setBrushColor(e.target.value)} style={{ width: 22, height: 22, border: 'none', cursor: 'pointer' }} />
                  </div>
                </div>
                <div className="drawing-toolbar-section">
                  <span style={{ fontSize: 11, color: darkMode ? '#aaa' : '#888' }}>Fill:</span>
                  <div className="color-picker-container">
                    {colors.slice(0, 6).map(c => <div key={'f'+c} className={'color-swatch ' + (fillColor === c ? 'active' : '')} style={{ backgroundColor: c, border: c === '#ffffff' ? '1px solid #ccc' : 'none' }} onClick={() => setFillColor(c)} />)}
                    <input type="color" value={fillColor} onChange={e => setFillColor(e.target.value)} style={{ width: 22, height: 22, border: 'none', cursor: 'pointer' }} />
                  </div>
                </div>
                <div className="drawing-toolbar-section">
                  <span style={{ fontSize: 11, color: darkMode ? '#aaa' : '#888' }}>Size:</span>
                  <input type="range" min="1" max="30" value={brushSize} onChange={e => setBrushSize(+e.target.value)} className="brush-size-slider" />
                  <span style={{ fontSize: 11, color: darkMode ? '#aaa' : '#888', minWidth: 16 }}>{brushSize}</span>
                </div>
              </div>
              {/* Canvas area */}
              <div style={{ position: 'relative' }}>
                <canvas ref={canvasRef} width={900} height={520} style={{ display: 'block', cursor: cursorStyle, touchAction: 'none', width: '100%' }} onPointerDown={handleDown} onPointerMove={wrappedMove} onPointerUp={handleUp} onPointerLeave={handleUp} onPointerCancel={handleUp} />
                <canvas ref={overlayRef} width={900} height={520} style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none' }} />
                {textPos && (
                  <div style={{ position: 'absolute', left: (textPos.x / 900 * 100) + '%', top: (textPos.y / 520 * 100) + '%', zIndex: 10 }}>
                    <input autoFocus type="text" value={textInput} onChange={e => setTextInput(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') commitText(); if (e.key === 'Escape') { setTextPos(null); setTextInput(''); } }}
                      style={{ fontSize: fontSize * 0.55, fontFamily, fontWeight: fontStyle === 'bold' ? 'bold' : 'normal', fontStyle: fontStyle === 'italic' ? 'italic' : 'normal', color: brushColor, background: 'rgba(255,255,255,0.9)', border: '2px solid #1D9E75', borderRadius: 4, padding: '4px 8px', outline: 'none', minWidth: 120 }}
                      placeholder="Type here..." />
                    <button onClick={commitText} style={{ marginLeft: 4, padding: '4px 10px', background: '#1D9E75', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer', fontSize: 12 }}>✓</button>
                  </div>
                )}
              </div>
              {/* Save bar */}
              <div style={{ padding: 12, display: 'flex', gap: 8, alignItems: 'center', background: darkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)', borderTop: '1px solid ' + (darkMode ? '#444' : '#e0ddd5') }}>
                <input type="text" placeholder="Drawing name..." value={currentDrawingName} onChange={e => setCurrentDrawingName(e.target.value)} style={{ flex: 1, padding: '8px 12px', border: '1px solid ' + (darkMode ? '#555' : '#d3d1c7'), borderRadius: 6, background: darkMode ? '#333' : '#fff', color: darkMode ? '#f5f5f5' : '#2c2c2a', fontSize: 14 }} />
                <button onClick={saveDrawing} style={{ padding: '8px 20px', background: '#1D9E75', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14, fontWeight: 500 }}>💾 Save</button>
                <button onClick={downloadDrawing} style={{ padding: '8px 16px', background: darkMode ? '#444' : '#f0f0f0', color: darkMode ? '#ccc' : '#333', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14 }}>⬇️</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==================== BOOK READER (Canvas Page Curl) ====================
    function BookReader({ darkMode, userId }) {
      const [books, setBooks] = useState([]);
      const [currentBook, setCurrentBook] = useState(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [totalPages, setTotalPages] = useState(0);
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(null);
      const [importing, setImporting] = useState(false);
      const [importProgress, setImportProgress] = useState('');
      const [isMaximized, setIsMaximized] = useState(false);
      const [pageImages, setPageImages] = useState({});
      const [pdfDoc, setPdfDoc] = useState(null);
      const [resumePrompt, setResumePrompt] = useState(null); // { book, pdf, lastPage, totalPages }
      const fileInputRef = useRef(null);
      const firestore = useFirestore(userId);

      // Canvas refs
      const canvasRef = useRef(null);
      const bookWrapperRef = useRef(null);
      const animRef = useRef(null);
      const flipStateRef = useRef(null); // { progress: 0-1, direction: 'next'|'prev', dragging: bool, startX, velocity }
      const pageImgCacheRef = useRef({}); // cached Image objects for canvas drawing
      const currentPageRef = useRef(0); // avoid stale closure in animation ticks

      useEffect(() => { (async () => { try { setBooks(await firestore.loadBooks()); } catch(e) { console.error(e); } setLoading(false); })(); }, []);

      // ---- PDF rendering ----
      const renderPage = async (pdf, pageNum, scale = 1.5) => {
        const page = await pdf.getPage(pageNum + 1);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width; canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        return canvas.toDataURL('image/jpeg', 0.85);
      };

      const loadVisiblePages = async (pdf, current) => {
        const needed = [current, current + 1, current + 2, current + 3, current - 1, current - 2].filter(p => p >= 0 && p < pdf.numPages && !pageImages[p]);
        if (needed.length === 0) return;
        const newImages = { ...pageImages };
        for (const p of needed) { newImages[p] = await renderPage(pdf, p, isMaximized ? 2.0 : 1.5); }
        setPageImages(newImages);
      };

      // Keep ref in sync with state
      useEffect(() => { currentPageRef.current = currentPage; }, [currentPage]);

      useEffect(() => { if (pdfDoc) loadVisiblePages(pdfDoc, currentPage); }, [currentPage, pdfDoc, isMaximized]);

      // ---- Convert data URLs to Image objects for canvas ----
      const getPageImg = useCallback((idx) => {
        if (idx < 0 || idx >= totalPages) return null;
        const src = pageImages[idx];
        if (!src) return null;
        if (pageImgCacheRef.current[idx] && pageImgCacheRef.current[idx]._src === src) return pageImgCacheRef.current[idx];
        const img = new Image();
        img.src = src;
        img._src = src;
        pageImgCacheRef.current[idx] = img;
        return img.complete ? img : null;
      }, [pageImages, totalPages]);

      // ---- Canvas page curl drawing engine ----
      const offscreenRef = useRef(null);

      const drawBook = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas || !canvas._logicalW) return;
        const W = canvas._logicalW, H = canvas._logicalH;
        const halfW = W / 2;
        const fs = flipStateRef.current;
        const cp = currentPageRef.current; // always fresh, no stale closure
        const li = cp, ri = cp + 1;

        // Double-buffer: draw to offscreen canvas first
        if (!offscreenRef.current) offscreenRef.current = document.createElement('canvas');
        const off = offscreenRef.current;
        if (off.width !== canvas.width || off.height !== canvas.height) {
          off.width = canvas.width; off.height = canvas.height;
        }
        const ctx = off.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);

        // Paper color
        const paperColor = '#fffdf7';
        const paperEdge = '#efe9de';

        // Draw a page image into a region
        const drawPageImage = (img, x, y, w, h, clipFn) => {
          ctx.save();
          if (clipFn) clipFn();
          if (img && img.complete && img.naturalWidth > 0) {
            // Maintain aspect ratio, center
            const imgAr = img.naturalWidth / img.naturalHeight;
            const boxAr = w / h;
            let dw, dh, dx, dy;
            if (imgAr > boxAr) { dw = w * 0.92; dh = dw / imgAr; } else { dh = h * 0.92; dw = dh * imgAr; }
            dx = x + (w - dw) / 2; dy = y + (h - dh) / 2;
            ctx.drawImage(img, dx, dy, dw, dh);
          }
          ctx.restore();
        };

        // ---- Draw static left page ----
        const drawLeftPage = (pageIdx) => {
          ctx.save();
          ctx.beginPath(); ctx.rect(0, 0, halfW, H); ctx.clip();
          // Page background
          const lgLeft = ctx.createLinearGradient(0, 0, halfW, 0);
          lgLeft.addColorStop(0, paperEdge); lgLeft.addColorStop(0.15, paperColor); lgLeft.addColorStop(1, paperColor);
          ctx.fillStyle = lgLeft; ctx.fillRect(0, 0, halfW, H);
          drawPageImage(getPageImg(pageIdx), 0, 0, halfW, H);
          // Spine shadow on left edge
          const spineGrad = ctx.createLinearGradient(0, 0, 30, 0);
          spineGrad.addColorStop(0, 'rgba(0,0,0,0.06)'); spineGrad.addColorStop(1, 'transparent');
          ctx.fillStyle = spineGrad; ctx.fillRect(0, 0, 30, H);
          // Inner spine shadow
          const innerGrad = ctx.createLinearGradient(halfW - 15, 0, halfW, 0);
          innerGrad.addColorStop(0, 'transparent'); innerGrad.addColorStop(1, 'rgba(0,0,0,0.04)');
          ctx.fillStyle = innerGrad; ctx.fillRect(halfW - 15, 0, 15, H);
          // Page number - clear badge at bottom
          ctx.font = '600 13px "EB Garamond", serif';
          const pnText = String(pageIdx + 1);
          const pnW = ctx.measureText(pnText).width + 16;
          const pnX = 14;
          const pnY = H - 28;
          ctx.fillStyle = 'rgba(139,115,85,0.12)';
          ctx.beginPath();
          ctx.roundRect(pnX, pnY, pnW, 20, 4);
          ctx.fill();
          ctx.fillStyle = '#5a4a38';
          ctx.textAlign = 'center';
          ctx.fillText(pnText, pnX + pnW / 2, pnY + 15);
          ctx.textAlign = 'start';
          ctx.restore();
        };

        // ---- Draw static right page ----
        const drawRightPage = (pageIdx) => {
          ctx.save();
          ctx.beginPath(); ctx.rect(halfW, 0, halfW, H); ctx.clip();
          const lgRight = ctx.createLinearGradient(W, 0, halfW, 0);
          lgRight.addColorStop(0, paperEdge); lgRight.addColorStop(0.15, paperColor); lgRight.addColorStop(1, paperColor);
          ctx.fillStyle = lgRight; ctx.fillRect(halfW, 0, halfW, H);
          drawPageImage(getPageImg(pageIdx), halfW, 0, halfW, H);
          // Edge shadow
          const edgeGrad = ctx.createLinearGradient(W - 30, 0, W, 0);
          edgeGrad.addColorStop(0, 'transparent'); edgeGrad.addColorStop(1, 'rgba(0,0,0,0.06)');
          ctx.fillStyle = edgeGrad; ctx.fillRect(W - 30, 0, 30, H);
          // Inner spine shadow
          const innerGrad = ctx.createLinearGradient(halfW, 0, halfW + 15, 0);
          innerGrad.addColorStop(0, 'rgba(0,0,0,0.04)'); innerGrad.addColorStop(1, 'transparent');
          ctx.fillStyle = innerGrad; ctx.fillRect(halfW, 0, 15, H);
          // Page number
          if (pageIdx < totalPages) {
            ctx.font = '600 13px "EB Garamond", serif';
            const pnText = String(pageIdx + 1);
            const pnW = ctx.measureText(pnText).width + 16;
            const pnX = W - 14 - pnW;
            const pnY = H - 28;
            ctx.fillStyle = 'rgba(139,115,85,0.12)';
            ctx.beginPath();
            ctx.roundRect(pnX, pnY, pnW, 20, 4);
            ctx.fill();
            ctx.fillStyle = '#5a4a38';
            ctx.textAlign = 'center';
            ctx.fillText(pnText, pnX + pnW / 2, pnY + 15);
            ctx.textAlign = 'start';
          } else {
            ctx.font = '18px "EB Garamond", serif';
            ctx.fillStyle = '#888';
            ctx.textAlign = 'center';
            ctx.fillText('✨ The End ✨', halfW + halfW / 2, H / 2);
          }
          ctx.restore();
        };

        // ---- Clean page flip with tilted fold line ----
        const drawPageCurl = (progress, direction) => {
          if (progress <= 0.001 || progress >= 0.999) return;
          const t = progress;
          const ease = Math.sin(t * Math.PI);

          if (direction === 'next') {
            // Fold line sweeps right→left with a natural tilt
            const foldCenter = halfW + halfW * (1 - t);
            const tilt = ease * 28;
            const fTopX = Math.min(W, foldCenter + tilt);
            const fBotX = Math.max(0, foldCenter - tilt);
            const backImg = getPageImg(ri + 1);

            // Width of the curled region (from fold to original right edge, reflected)
            const curlW = W - foldCenter;

            // === 1. Shadow on the page underneath ===
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(fTopX, 0); ctx.lineTo(fBotX, H);
            ctx.lineTo(W, H); ctx.lineTo(W, 0); ctx.closePath();
            ctx.clip();
            const sw = 18 + ease * 45;
            const sg = ctx.createLinearGradient(foldCenter, H / 2, foldCenter + sw, H / 2);
            sg.addColorStop(0, 'rgba(0,0,0,' + (0.42 * ease) + ')');
            sg.addColorStop(0.12, 'rgba(0,0,0,' + (0.18 * ease) + ')');
            sg.addColorStop(0.4, 'rgba(0,0,0,' + (0.05 * ease) + ')');
            sg.addColorStop(1, 'transparent');
            ctx.fillStyle = sg; ctx.fillRect(foldCenter - tilt - 5, 0, sw + tilt * 2 + 10, H);
            ctx.restore();

            // Shadow on left page when fold crosses spine
            if (t > 0.5) {
              ctx.save();
              ctx.beginPath(); ctx.rect(0, 0, halfW, H); ctx.clip();
              const lp = (t - 0.5) / 0.5;
              const lsg = ctx.createLinearGradient(halfW, 0, halfW - halfW * lp * 0.3, 0);
              lsg.addColorStop(0, 'rgba(0,0,0,' + (0.15 * lp) + ')');
              lsg.addColorStop(1, 'transparent');
              ctx.fillStyle = lsg; ctx.fillRect(0, 0, halfW, H);
              ctx.restore();
            }

            // === 2. Curled page (back side) ===
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(fTopX, 0); ctx.lineTo(fBotX, H);
            // Left boundary of curled region (reflected fold)
            const rTopX = fTopX - 2 * curlW;
            const rBotX = fBotX - 2 * curlW;
            ctx.lineTo(Math.max(0, rBotX), H);
            ctx.lineTo(Math.max(0, rTopX), 0);
            ctx.closePath();
            ctx.clip();

            // Opaque paper
            ctx.fillStyle = '#faf7f0';
            ctx.fillRect(0, 0, W, H);

            // Draw back page image (mirrored across fold)
            if (backImg && backImg.complete && backImg.naturalWidth > 0) {
              const imgAr = backImg.naturalWidth / backImg.naturalHeight;
              const boxAr = halfW / H;
              let dw, dh;
              if (imgAr > boxAr) { dw = halfW * 0.92; dh = dw / imgAr; }
              else { dh = H * 0.92; dw = dh * imgAr; }
              const imgDy = (H - dh) / 2;
              ctx.save();
              ctx.translate(foldCenter, 0);
              ctx.scale(-1, 1);
              const imgDx = (halfW - dw) / 2;
              ctx.drawImage(backImg, imgDx, imgDy, dw, dh);
              ctx.restore();
            }

            // Subtle shading on curled page
            const cg = ctx.createLinearGradient(foldCenter, H / 2, foldCenter - curlW, H / 2);
            cg.addColorStop(0, 'rgba(0,0,0,' + (0.1 * ease) + ')');
            cg.addColorStop(0.06, 'rgba(255,255,255,' + (0.08 * ease) + ')');
            cg.addColorStop(0.15, 'transparent');
            cg.addColorStop(0.85, 'transparent');
            cg.addColorStop(1, 'rgba(0,0,0,' + (0.04 * ease) + ')');
            ctx.fillStyle = cg; ctx.fillRect(0, 0, W, H);
            ctx.restore();

            // === 3. Fold line ===
            ctx.save();
            ctx.strokeStyle = 'rgba(60,45,20,' + (0.3 * ease) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(fTopX, 0); ctx.lineTo(fBotX, H); ctx.stroke();
            // Highlight beside fold
            ctx.strokeStyle = 'rgba(255,255,255,' + (0.25 * ease) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(fTopX - 2, 0); ctx.lineTo(fBotX - 2, H); ctx.stroke();
            ctx.restore();

          } else {
            // --- PREV: fold sweeps left→right with tilt ---
            const foldCenter = halfW * t;
            const tilt = ease * 28;
            const fTopX = Math.max(0, foldCenter - tilt);
            const fBotX = Math.min(W, foldCenter + tilt);
            const backImg = getPageImg(li - 1);
            const curlW = foldCenter;

            // === 1. Shadow ===
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(fTopX, 0); ctx.lineTo(fBotX, H);
            ctx.lineTo(0, H); ctx.lineTo(0, 0); ctx.closePath();
            ctx.clip();
            const sw = 18 + ease * 45;
            const sg = ctx.createLinearGradient(foldCenter, H / 2, foldCenter - sw, H / 2);
            sg.addColorStop(0, 'rgba(0,0,0,' + (0.42 * ease) + ')');
            sg.addColorStop(0.12, 'rgba(0,0,0,' + (0.18 * ease) + ')');
            sg.addColorStop(0.4, 'rgba(0,0,0,' + (0.05 * ease) + ')');
            sg.addColorStop(1, 'transparent');
            ctx.fillStyle = sg; ctx.fillRect(foldCenter - sw - tilt - 5, 0, sw + tilt * 2 + 10, H);
            ctx.restore();

            if (t > 0.5) {
              ctx.save();
              ctx.beginPath(); ctx.rect(halfW, 0, halfW, H); ctx.clip();
              const rp = (t - 0.5) / 0.5;
              const rsg = ctx.createLinearGradient(halfW, 0, halfW + halfW * rp * 0.3, 0);
              rsg.addColorStop(0, 'rgba(0,0,0,' + (0.15 * rp) + ')');
              rsg.addColorStop(1, 'transparent');
              ctx.fillStyle = rsg; ctx.fillRect(halfW, 0, halfW, H);
              ctx.restore();
            }

            // === 2. Curled page ===
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(fTopX, 0); ctx.lineTo(fBotX, H);
            const rTopX = fTopX + 2 * curlW;
            const rBotX = fBotX + 2 * curlW;
            ctx.lineTo(Math.min(W, rBotX), H);
            ctx.lineTo(Math.min(W, rTopX), 0);
            ctx.closePath();
            ctx.clip();

            ctx.fillStyle = '#faf7f0';
            ctx.fillRect(0, 0, W, H);

            if (backImg && backImg.complete && backImg.naturalWidth > 0) {
              const imgAr = backImg.naturalWidth / backImg.naturalHeight;
              const boxAr = halfW / H;
              let dw, dh;
              if (imgAr > boxAr) { dw = halfW * 0.92; dh = dw / imgAr; }
              else { dh = H * 0.92; dw = dh * imgAr; }
              const imgDy = (H - dh) / 2;
              ctx.save();
              ctx.translate(foldCenter, 0);
              ctx.scale(-1, 1);
              const imgDx = -(halfW - (halfW - dw) / 2);
              ctx.drawImage(backImg, imgDx, imgDy, dw, dh);
              ctx.restore();
            }

            const cg = ctx.createLinearGradient(foldCenter, H / 2, foldCenter + curlW, H / 2);
            cg.addColorStop(0, 'rgba(0,0,0,' + (0.1 * ease) + ')');
            cg.addColorStop(0.06, 'rgba(255,255,255,' + (0.08 * ease) + ')');
            cg.addColorStop(0.15, 'transparent');
            cg.addColorStop(0.85, 'transparent');
            cg.addColorStop(1, 'rgba(0,0,0,' + (0.04 * ease) + ')');
            ctx.fillStyle = cg; ctx.fillRect(0, 0, W, H);
            ctx.restore();

            // === 3. Fold line ===
            ctx.save();
            ctx.strokeStyle = 'rgba(60,45,20,' + (0.3 * ease) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(fTopX, 0); ctx.lineTo(fBotX, H); ctx.stroke();
            ctx.strokeStyle = 'rgba(255,255,255,' + (0.25 * ease) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(fTopX + 2, 0); ctx.lineTo(fBotX + 2, H); ctx.stroke();
            ctx.restore();
          }
        };

        // ---- Book spine ----
        const drawSpine = () => {
          const spineW = 6;
          const sx = halfW - spineW / 2;
          const spineGrad = ctx.createLinearGradient(sx, 0, sx + spineW, 0);
          spineGrad.addColorStop(0, '#5a3a1a');
          spineGrad.addColorStop(0.3, '#8B4513');
          spineGrad.addColorStop(0.5, '#A0522D');
          spineGrad.addColorStop(0.7, '#8B4513');
          spineGrad.addColorStop(1, '#5a3a1a');
          ctx.fillStyle = spineGrad;
          ctx.fillRect(sx, 0, spineW, H);
          // Spine shadow (subtle)
          ctx.shadowColor = 'rgba(0,0,0,0.3)';
          ctx.shadowBlur = 8;
          ctx.fillRect(sx, 0, spineW, H);
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
        };

        // ---- Compose the scene ----
        if (fs && fs.progress > 0.001 && fs.progress < 0.999) {
          if (fs.direction === 'next') {
            drawLeftPage(li);
            drawRightPage(ri + 2 < totalPages ? ri + 2 : totalPages);
            drawSpine();
            // Draw curl ON TOP of spine so spine is hidden under the curled page
            drawPageCurl(fs.progress, 'next');
          } else {
            drawLeftPage(li - 2 >= 0 ? li - 2 : 0);
            drawRightPage(ri);
            drawSpine();
            drawPageCurl(fs.progress, 'prev');
          }
        } else {
          drawLeftPage(li);
          drawRightPage(ri);
          drawSpine();
        }

        // Blit offscreen to visible canvas in one atomic operation (no flicker)
        const visCtx = canvas.getContext('2d');
        visCtx.setTransform(1, 0, 0, 1, 0, 0);
        visCtx.drawImage(off, 0, 0);
      }, [totalPages, getPageImg]);

      // ---- Resize canvas to match wrapper ----
      const updateCanvasSize = useCallback(() => {
        const wrapper = bookWrapperRef.current;
        const canvas = canvasRef.current;
        if (!wrapper || !canvas) return;
        const dpr = window.devicePixelRatio || 1;
        const rect = wrapper.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // reset then scale (avoids cumulative scale)
        // Store logical size for drawing
        canvas._logicalW = rect.width;
        canvas._logicalH = rect.height;
        drawBook();
      }, [drawBook]);

      useEffect(() => {
        if (currentBook) {
          setTimeout(updateCanvasSize, 50);
          window.addEventListener('resize', updateCanvasSize);
          return () => window.removeEventListener('resize', updateCanvasSize);
        }
      }, [currentBook, updateCanvasSize, isMaximized]);

      // Redraw when pages load or page changes
      useEffect(() => { if (currentBook && !flipStateRef.current) drawBook(); }, [pageImages, currentPage, currentBook]);

      // ---- Animation loop for smooth flip ----
      const animateFlip = useCallback((direction, onComplete) => {
        const duration = 700; // ms
        const startTime = performance.now();
        flipStateRef.current = { progress: 0, direction, dragging: false };
        
        const tick = (now) => {
          const elapsed = now - startTime;
          let t = Math.min(1, elapsed / duration);
          // Ease in-out cubic
          t = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
          flipStateRef.current = { ...flipStateRef.current, progress: t };
          drawBook();
          if (elapsed < duration) {
            animRef.current = requestAnimationFrame(tick);
          } else {
            flipStateRef.current = null;
            if (onComplete) onComplete();
            // Safe to call - drawBook uses currentPageRef (always fresh)
            drawBook();
          }
        };
        animRef.current = requestAnimationFrame(tick);
      }, [drawBook]);

      // ---- Turn page with animation ----
      const turnPage = useCallback((dir) => {
        if (flipStateRef.current) return; // already flipping
        if (dir === 'next' && currentPage < totalPages - 2) {
          // Preload
          const np = currentPage + 2;
          if (pdfDoc && !pageImages[np]) renderPage(pdfDoc, np, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [np]: img})));
          if (pdfDoc && !pageImages[np+1]) renderPage(pdfDoc, np+1, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [np+1]: img})));
          animateFlip('next', () => setCurrentPage(p => Math.min(p + 2, totalPages - 1)));
        } else if (dir === 'prev' && currentPage > 0) {
          const pp = currentPage - 2;
          if (pdfDoc && pp >= 0 && !pageImages[pp]) renderPage(pdfDoc, pp, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [pp]: img})));
          if (pdfDoc && pp+1 >= 0 && !pageImages[pp+1]) renderPage(pdfDoc, pp+1, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [pp+1]: img})));
          animateFlip('prev', () => setCurrentPage(p => Math.max(p - 2, 0)));
        }
      }, [currentPage, totalPages, pdfDoc, pageImages, isMaximized, animateFlip]);

      // ---- Drag/touch handlers ----
      const dragRef = useRef(null);

      const handlePointerDown = useCallback((e) => {
        if (flipStateRef.current) return;
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX);
        const relX = x - rect.left;
        const mid = rect.width / 2;
        let dir = null;
        if (relX > mid && currentPage < totalPages - 2) dir = 'next';
        else if (relX <= mid && currentPage > 0) dir = 'prev';
        if (!dir) return;
        if (e.cancelable) e.preventDefault();
        // Preload pages
        if (dir === 'next') {
          const np = currentPage + 2;
          if (pdfDoc && !pageImages[np]) renderPage(pdfDoc, np, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [np]: img})));
          if (pdfDoc && !pageImages[np+1]) renderPage(pdfDoc, np+1, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [np+1]: img})));
        } else {
          const pp = currentPage - 2;
          if (pdfDoc && pp >= 0 && !pageImages[pp]) renderPage(pdfDoc, pp, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [pp]: img})));
          if (pdfDoc && pp+1 >= 0 && !pageImages[pp+1]) renderPage(pdfDoc, pp+1, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [pp+1]: img})));
        }
        dragRef.current = { startX: x, currentX: x, direction: dir, width: rect.width, lastX: x, lastTime: Date.now(), velocity: 0 };
        flipStateRef.current = { progress: 0.001, direction: dir, dragging: true };
        canvas.classList.add('dragging');
      }, [currentPage, totalPages, pdfDoc, pageImages, isMaximized]);

      useEffect(() => {
        const onMove = (e) => {
          if (!dragRef.current) return;
          if (e.cancelable) e.preventDefault();
          const x = (e.touches ? e.touches[0].clientX : e.clientX);
          const now = Date.now();
          const dt = now - dragRef.current.lastTime;
          if (dt > 0) dragRef.current.velocity = (x - dragRef.current.lastX) / dt;
          dragRef.current.currentX = x;
          dragRef.current.lastX = x;
          dragRef.current.lastTime = now;
          
          const dx = x - dragRef.current.startX;
          const halfW = dragRef.current.width / 2;
          let progress;
          if (dragRef.current.direction === 'next') {
            progress = Math.max(0.001, Math.min(0.999, -dx / halfW));
          } else {
            progress = Math.max(0.001, Math.min(0.999, dx / halfW));
          }
          flipStateRef.current = { progress, direction: dragRef.current.direction, dragging: true };
          drawBook();
        };

        const onEnd = () => {
          if (!dragRef.current) return;
          const d = dragRef.current;
          const dx = d.currentX - d.startX;
          const threshold = d.width * 0.12;
          const velocityThreshold = 0.3;
          const shouldFlip =
            (d.direction === 'next' && (dx < -threshold || d.velocity < -velocityThreshold)) ||
            (d.direction === 'prev' && (dx > threshold || d.velocity > velocityThreshold));

          const currentProgress = flipStateRef.current ? flipStateRef.current.progress : 0;
          const dir = d.direction;
          dragRef.current = null;
          canvasRef.current?.classList.remove('dragging');

          if (shouldFlip) {
            // Animate from current progress to 1
            const remaining = 1 - currentProgress;
            const duration = Math.max(150, remaining * 500);
            const startTime = performance.now();
            const startP = currentProgress;
            const tick = (now) => {
              const elapsed = now - startTime;
              let t = Math.min(1, elapsed / duration);
              t = 1 - Math.pow(1 - t, 3); // ease out
              const p = startP + (1 - startP) * t;
              flipStateRef.current = { progress: p, direction: dir, dragging: false };
              drawBook();
              if (elapsed < duration) {
                animRef.current = requestAnimationFrame(tick);
              } else {
                flipStateRef.current = null;
                setCurrentPage(prev => dir === 'next' ? Math.min(prev + 2, totalPages - 1) : Math.max(prev - 2, 0));
              }
            };
            animRef.current = requestAnimationFrame(tick);
          } else {
            // Snap back
            const duration = Math.max(150, currentProgress * 400);
            const startTime = performance.now();
            const startP = currentProgress;
            const tick = (now) => {
              const elapsed = now - startTime;
              let t = Math.min(1, elapsed / duration);
              t = 1 - Math.pow(1 - t, 3);
              const p = startP * (1 - t);
              flipStateRef.current = { progress: p, direction: dir, dragging: false };
              drawBook();
              if (elapsed < duration) {
                animRef.current = requestAnimationFrame(tick);
              } else {
                flipStateRef.current = null;
                // Redraw static pages after snap back (no setCurrentPage triggers re-render)
                requestAnimationFrame(() => drawBook());
              }
            };
            animRef.current = requestAnimationFrame(tick);
          }
        };

        window.addEventListener('mousemove', onMove, { passive: false });
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onEnd);
        return () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onEnd);
          window.removeEventListener('touchmove', onMove);
          window.removeEventListener('touchend', onEnd);
          if (animRef.current) cancelAnimationFrame(animRef.current);
        };
      }, [drawBook, totalPages]);

      // ---- File upload ----
      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') { alert('Please select a PDF file'); return; }
        setImporting(true); setImportProgress('Reading PDF...');
        const reader = new FileReader();
        reader.onload = async (ev) => {
          try {
            setImportProgress('Parsing PDF...');
            const arrayBuf = ev.target.result;
            const pdfBytes = new Uint8Array(arrayBuf);
            const pdfBytesCopy = new Uint8Array(pdfBytes);
            const pdf = await window.pdfjsLib.getDocument({ data: pdfBytesCopy }).promise;
            let binary = '';
            const chunkSize = 8192;
            for (let i = 0; i < pdfBytes.length; i += chunkSize) { binary += String.fromCharCode.apply(null, pdfBytes.subarray(i, i + chunkSize)); }
            const pdfBase64 = btoa(binary);
            const bookData = { name: file.name.replace('.pdf', ''), totalPages: pdf.numPages, pdfBase64, lastPage: 0, addedDate: new Date().toLocaleString() };
            setSyncing('syncing'); setImportProgress('Uploading to cloud...');
            const id = await firestore.saveBook(bookData, (pct) => setImportProgress('Uploading... ' + pct + '%'));
            setBooks([{ id, name: bookData.name, totalPages: bookData.totalPages, lastPage: 0, addedDate: bookData.addedDate }, ...books]);
            setSyncing('synced'); setTimeout(() => setSyncing(null), 2000);
          } catch (err) { console.error('PDF Import Error:', err); alert('Error loading PDF: ' + (err.message || err)); setSyncing('error'); }
          setImporting(false); setImportProgress('');
        };
        reader.onerror = () => { alert('Error reading file.'); setImporting(false); setImportProgress(''); };
        reader.readAsArrayBuffer(file); e.target.value = '';
      };

      const openBook = async (book) => {
        setLoading(true);
        try {
          const pdfData = await firestore.loadBookPdf(book.id);
          const pdf = await window.pdfjsLib.getDocument({ data: new Uint8Array(pdfData) }).promise;
          const lastPage = book.lastPage || 0;
          // If there's a saved position beyond page 0, ask user
          if (lastPage > 0) {
            setResumePrompt({ book, pdf, lastPage, totalPages: pdf.numPages });
            setLoading(false);
            return;
          }
          // No saved position, start from beginning
          setPdfDoc(pdf); setPageImages({}); pageImgCacheRef.current = {};
          setCurrentBook(book); setTotalPages(pdf.numPages); setCurrentPage(0);
          currentPageRef.current = 0;
        } catch(e) { console.error(e); alert('Error loading book: ' + (e.message || e)); }
        setLoading(false);
      };

      const handleResume = (startPage) => {
        const { book, pdf } = resumePrompt;
        setPdfDoc(pdf); setPageImages({}); pageImgCacheRef.current = {};
        setCurrentBook(book); setTotalPages(pdf.numPages);
        const page = startPage === 'continue' ? resumePrompt.lastPage : 0;
        setCurrentPage(page); currentPageRef.current = page;
        setResumePrompt(null);
      };

      const closeBook = async () => {
        if (currentBook) { try { await firestore.updateBookProgress(currentBook.id, currentPageRef.current); setBooks(books.map(b => b.id === currentBook.id ? { ...b, lastPage: currentPageRef.current } : b)); } catch(e) {} }
        setCurrentBook(null); setPdfDoc(null); setPageImages({}); pageImgCacheRef.current = {}; setIsMaximized(false);
        if (animRef.current) cancelAnimationFrame(animRef.current);
        flipStateRef.current = null;
      };

      // Auto-save progress every time page changes
      useEffect(() => {
        if (!currentBook || currentPage === 0) return;
        const t = setTimeout(() => {
          firestore.updateBookProgress(currentBook.id, currentPage)
            .then(() => setBooks(prev => prev.map(b => b.id === currentBook.id ? { ...b, lastPage: currentPage } : b)))
            .catch(() => {});
        }, 1500); // debounce 1.5s
        return () => clearTimeout(t);
      }, [currentPage, currentBook]);

      const handleDelete = async (id) => { setSyncing('syncing'); try { await firestore.deleteBook(id); setBooks(books.filter(b => b.id !== id)); setSyncing('synced'); setTimeout(() => setSyncing(null), 2000); } catch(e) { setSyncing('error'); } };

      if (loading) return <div style={{ textAlign: 'center', padding: '3rem' }}><div className="loading-spinner" style={{ borderColor: 'rgba(29,158,117,0.3)', borderTopColor: '#1D9E75', width: 40, height: 40 }}></div><p style={{ marginTop: '1rem', color: darkMode ? '#aaa' : '#888' }}>{currentBook ? 'Loading book...' : 'Loading library...'}</p></div>;

      // Resume reading dialog
      if (resumePrompt) {
        const rp = resumePrompt;
        const pct = Math.round((rp.lastPage / rp.totalPages) * 100);
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '3rem 1rem' }}>
            <div style={{ background: darkMode ? '#2a2a2a' : '#fff', borderRadius: 16, padding: '2.5rem', maxWidth: 420, width: '100%', boxShadow: '0 12px 40px rgba(0,0,0,0.15)', border: '1px solid ' + (darkMode ? '#444' : '#e0ddd5'), textAlign: 'center' }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>📖</div>
              <h3 style={{ fontSize: 18, fontWeight: 600, color: darkMode ? '#f5f5f5' : '#2c2c2a', marginBottom: 8 }}>{rp.book.name}</h3>
              <p style={{ fontSize: 14, color: darkMode ? '#aaa' : '#888', marginBottom: 20 }}>
                You were reading page <strong style={{ color: '#1D9E75' }}>{rp.lastPage + 1}</strong> of {rp.totalPages}
              </p>
              <div style={{ background: darkMode ? '#333' : '#f5f2eb', borderRadius: 8, padding: 12, marginBottom: 24 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: darkMode ? '#aaa' : '#888', marginBottom: 6 }}>
                  <span>Progress</span><span>{pct}%</span>
                </div>
                <div style={{ background: darkMode ? '#444' : '#e0ddd5', borderRadius: 4, height: 6, overflow: 'hidden' }}>
                  <div style={{ width: pct + '%', height: '100%', background: 'linear-gradient(90deg, #1D9E75, #27b88a)', borderRadius: 4, transition: 'width 0.6s ease' }}></div>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 12 }}>
                <button onClick={() => handleResume('fresh')} style={{ flex: 1, padding: '12px 16px', background: darkMode ? '#444' : '#f0ede5', color: darkMode ? '#ddd' : '#5a4a38', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 14, fontWeight: 500 }}>
                  📄 Start Fresh
                </button>
                <button onClick={() => handleResume('continue')} style={{ flex: 1, padding: '12px 16px', background: '#1D9E75', color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 14, fontWeight: 600, boxShadow: '0 4px 12px rgba(29,158,117,0.3)' }}>
                  ▶ Continue (pg {rp.lastPage + 1})
                </button>
              </div>
              <button onClick={() => setResumePrompt(null)} style={{ marginTop: 16, background: 'none', border: 'none', color: darkMode ? '#888' : '#aaa', cursor: 'pointer', fontSize: 13 }}>← Back to Library</button>
            </div>
          </div>
        );
      }

      if (!currentBook) {
        return (
          <div>
            <SyncIndicator status={syncing} />
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
              <h2 style={{ fontSize: '1.25rem', color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>📚 My Book Library</h2>
              <button onClick={() => fileInputRef.current?.click()} disabled={importing} style={{ padding: '10px 20px', background: '#1D9E75', color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 14, fontWeight: 500, opacity: importing ? 0.6 : 1 }}>{importing ? ('⏳ ' + (importProgress || 'Importing...')) : '📄 Import PDF Book'}</button>
              <input ref={fileInputRef} type="file" accept=".pdf" onChange={handleFileUpload} style={{ display: 'none' }} />
            </div>
            {books.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '3rem', color: darkMode ? '#aaa' : '#888' }}>
                <p style={{ fontSize: 64, marginBottom: '1rem' }}>📚</p>
                <p style={{ fontSize: 16, marginBottom: '0.5rem' }}>Your library is empty</p>
                <p style={{ fontSize: 14 }}>Import a PDF book to start reading!</p>
                <p style={{ fontSize: 12, marginTop: '1rem', color: '#1D9E75' }}>☁️ Books sync across all your devices</p>
              </div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: '1.5rem' }}>
                {books.map(book => (
                  <div key={book.id} style={{ background: darkMode ? '#333' : '#fff', borderRadius: 12, overflow: 'hidden', border: '1px solid ' + (darkMode ? '#444' : '#e0ddd5'), transition: 'all 0.2s', cursor: 'pointer' }}
                    onMouseOver={e => { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = '0 8px 25px rgba(0,0,0,0.15)'; }}
                    onMouseOut={e => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = 'none'; }}>
                    <div onClick={() => openBook(book)} style={{ height: 160, background: 'linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #654321 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
                      <div style={{ background: 'rgba(255,255,255,0.9)', padding: '15px 10px', borderRadius: 4, textAlign: 'center', maxWidth: '80%' }}>
                        <p style={{ fontSize: 12, fontWeight: 600, color: '#333', wordBreak: 'break-word' }}>{book.name}</p>
                      </div>
                      {book.lastPage > 0 && <div style={{ position: 'absolute', top: 8, right: 8, background: '#1D9E75', color: 'white', padding: '2px 8px', borderRadius: 10, fontSize: 10 }}>Page {book.lastPage + 1}</div>}
                    </div>
                    <div style={{ padding: 12 }}>
                      <p style={{ fontSize: 14, fontWeight: 500, color: darkMode ? '#f5f5f5' : '#2c2c2a', marginBottom: 4 }}>{book.name.length > 20 ? book.name.substring(0, 20) + '...' : book.name}</p>
                      <p style={{ fontSize: 11, color: darkMode ? '#888' : '#aaa', marginBottom: 8 }}>{book.totalPages} pages</p>
                      <div style={{ display: 'flex', gap: 8 }}>
                        <button onClick={e => { e.stopPropagation(); openBook(book); }} style={{ flex: 1, padding: 6, background: '#1D9E75', color: 'white', border: 'none', borderRadius: 4, fontSize: 12, cursor: 'pointer' }}>📖 Read</button>
                        <button onClick={e => { e.stopPropagation(); handleDelete(book.id); }} style={{ padding: '6px 10px', background: '#e24b4a', color: 'white', border: 'none', borderRadius: 4, fontSize: 12, cursor: 'pointer' }}>🗑️</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      const li = currentPage, ri = currentPage + 1;

      return (
        <div className={isMaximized ? 'book-maximized' : ''}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: isMaximized ? 0 : '1rem', flexWrap: 'wrap', gap: '0.5rem', padding: isMaximized ? '8px 20px' : 0, background: isMaximized ? 'rgba(30,25,20,0.9)' : 'transparent' }}>
            <button onClick={closeBook} style={{ padding: '7px 14px', background: 'transparent', color: isMaximized ? '#ccc' : (darkMode ? '#ccc' : '#5f5e5a'), border: '1px solid ' + (isMaximized || darkMode ? '#555' : '#d3d1c7'), borderRadius: 6, cursor: 'pointer', fontSize: 13 }}>← Back</button>
            <h3 style={{ fontSize: '0.85rem', color: isMaximized ? '#e8e0d0' : (darkMode ? '#f5f5f5' : '#2c2c2a'), flex: 1, textAlign: 'center', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontFamily: 'EB Garamond, serif', letterSpacing: 0.5 }}>📖 {currentBook.name}</h3>
            <button onClick={() => { setIsMaximized(!isMaximized); setPageImages({}); pageImgCacheRef.current = {}; setTimeout(updateCanvasSize, 100); }} style={{ padding: '7px 14px', background: '#1D9E75', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 13 }}>{isMaximized ? '🗗 Minimize' : '🗖 Maximize'}</button>
          </div>
          <div className="book-container" style={isMaximized ? { flex: 1, minHeight: 0, alignItems: 'center' } : {}}>
            <button className="nav-arrow" onClick={() => turnPage('prev')} disabled={currentPage === 0 || !!flipStateRef.current}>◀</button>
            <div className={'book-wrapper' + (isMaximized ? ' maximized' : '')} ref={bookWrapperRef}>
              <canvas ref={canvasRef} className="book-canvas"
                onMouseDown={handlePointerDown} onTouchStart={handlePointerDown} />
              <div className="book-shadow"></div>
            </div>
            <button className="nav-arrow" onClick={() => turnPage('next')} disabled={currentPage >= totalPages - 2 || !!flipStateRef.current}>▶</button>
          </div>
          <div style={{ textAlign: 'center', marginTop: isMaximized ? '0.3rem' : '1rem', padding: isMaximized ? '0 20px 8px' : 0, color: isMaximized ? '#999' : (darkMode ? '#aaa' : '#666') }}>
            <p style={{ fontSize: 13, marginBottom: 6, fontFamily: 'EB Garamond, serif' }}>Pages {li + 1}–{Math.min(ri + 1, totalPages)} of {totalPages}</p>
            <input type="range" min="0" max={Math.max(0, totalPages - 2)} step="2" value={currentPage} onChange={e => { if (!flipStateRef.current) { setCurrentPage(+e.target.value); } }} style={{ width: isMaximized ? '50%' : 'clamp(150px, 60%, 280px)', cursor: 'pointer', accentColor: '#8B4513' }} />
          </div>
        </div>
      );
    }

    // ==================== MAIN DIARY ====================
    function DigitalDiary() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [authError, setAuthError] = useState('');
      const [entries, setEntries] = useState([]);
      const [currentPage, setCurrentPage] = useState('view');
      const [newEntry, setNewEntry] = useState('');
      const [entryMood, setEntryMood] = useState('neutral');
      const [searchQuery, setSearchQuery] = useState('');
      const [darkMode, setDarkMode] = useState(false);
      const [selectedEntry, setSelectedEntry] = useState(null);
      const [syncing, setSyncing] = useState(null);
      const [entriesLoading, setEntriesLoading] = useState(true);

      useEffect(() => { const unsub = auth.onAuthStateChanged(u => { setUser(u); setAuthLoading(false); }); return () => unsub(); }, []);

      const firestore = user ? useFirestore(user.uid) : null;

      useEffect(() => { if (user && firestore) { (async () => { setEntriesLoading(true); try { setEntries(await firestore.loadEntries()); } catch(e) { console.error(e); } setEntriesLoading(false); })(); } }, [user]);

      const handleAuth = async () => {
        setAuthError('');
        if (!email || !password) { setAuthError('Please enter email and password'); return; }
