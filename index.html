<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal Diary</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Source+Serif+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .light-mode { background: linear-gradient(135deg, #f5f3ef 0%, #e8e4dd 100%); color: #2c2c2a; }
    .dark-mode { background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); color: #f5f5f5; }
    .book-container { display: flex; justify-content: center; align-items: center; min-height: 550px; user-select: none; gap: 12px; position: relative; }
    .book-maximized { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; background: rgba(30,25,20,0.97); display: flex; flex-direction: column; }
    .book-wrapper {
      position: relative; width: clamp(320px, 85vw, 900px); height: clamp(240px, 60vw, 620px);
      border-radius: 4px;
      box-shadow: 0 5px 30px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,0,0,0.05);
      background: #f5f0e6;
      touch-action: none;
      overflow: hidden;
    }
    .book-wrapper.maximized { width: 95vw; height: calc(100vh - 90px); max-width: 1400px; max-height: calc(100vh - 100px); }
    .book-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: grab; }
    .book-canvas.dragging { cursor: grabbing; }
    /* Book spine */
    .book-spine {
      position: absolute; left: 50%; top: 0; width: 6px; height: 100%; transform: translateX(-50%);
      background: linear-gradient(90deg, #5a3a1a 0%, #8B4513 30%, #A0522D 50%, #8B4513 70%, #5a3a1a 100%);
      box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index: 10; border-radius: 2px;
      pointer-events: none;
    }
    /* Book covers shadow */
    .book-shadow {
      position: absolute; bottom: -12px; left: 10%; width: 80%; height: 15px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.25) 0%, transparent 70%);
      filter: blur(4px); pointer-events: none;
    }
    /* Navigation arrows */
    .nav-arrow {
      width: 44px; height: 70px; z-index: 20; flex-shrink: 0;
      background: rgba(139,69,19,0.1); border: 1px solid rgba(139,69,19,0.2); border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #8B4513; transition: all 0.3s;
    }
    .nav-arrow:hover { background: rgba(139,69,19,0.25); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .nav-arrow:disabled { opacity: 0.2; cursor: default; }
    .nav-arrow:disabled:hover { background: rgba(139,69,19,0.1); box-shadow: none; }
    @media (max-width: 700px) {
      .nav-arrow { width: 32px; height: 50px; font-size: 14px; background: rgba(139,69,19,0.2); }
      .book-container { gap: 6px; }
      .book-wrapper { height: clamp(220px, 70vh, 500px); }
    }
    .drawing-canvas-container { position: relative; border: 2px solid #d3d1c7; border-radius: 12px; overflow: hidden; background: white; }
    .drawing-toolbar { display: flex; gap: 10px; flex-wrap: wrap; padding: 15px; background: rgba(0,0,0,0.03); border-bottom: 1px solid #e0ddd5; align-items: center; }
    .color-picker-container { display: flex; gap: 5px; align-items: center; }
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s; }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: #333; box-shadow: 0 0 0 2px white, 0 0 0 4px #1D9E75; }
    .brush-size-slider { width: 100px; }
    .saved-drawings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .saved-drawing-item { border: 1px solid #e0ddd5; border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
    .saved-drawing-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .saved-drawing-item img { width: 100%; height: 120px; object-fit: cover; }
    .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sync-indicator { position: fixed; top: 15px; right: 15px; padding: 6px 14px; border-radius: 20px; font-size: 12px; z-index: 999; transition: all 0.3s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBjKkRN2wwXg8ww2hvAmU83gplt4WaVcsA",
      authDomain: "my-personal-diary-dcb9a.firebaseapp.com",
      projectId: "my-personal-diary-dcb9a",
      storageBucket: "my-personal-diary-dcb9a.firebasestorage.app",
      messagingSenderId: "564470464140",
      appId: "1:564470464140:web:2bfdb2fbef0baaf0e9c5a9",
      measurementId: "G-1WQL5Y9KES"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // PDF.js worker
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ==================== FIREBASE HELPER ====================
    function useFirestore(userId) {
      const getCollection = (name) => db.collection('users').doc(userId).collection(name);

      const loadEntries = async () => {
        const snap = await getCollection('entries').orderBy('createdAt', 'desc').get();
        return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      };

      const saveEntry = async (entry) => {
        const ref = await getCollection('entries').add({ ...entry, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        return ref.id;
      };

      const deleteEntry = async (id) => { await getCollection('entries').doc(id).delete(); };

      const loadBooks = async () => {
        const snap = await getCollection('books').orderBy('addedAt', 'desc').get();
        return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      };

      const saveBook = async (book, onProgress) => {
        const meta = { name: book.name, totalPages: book.totalPages, lastPage: book.lastPage || 0, addedDate: book.addedDate, addedAt: firebase.firestore.FieldValue.serverTimestamp() };
        const ref = await getCollection('books').add(meta);
        // Store PDF binary as base64 chunks (each < 900KB for Firestore 1MB limit)
        const base64 = book.pdfBase64;
        const chunkLen = 700000; // ~700KB per chunk
        const totalChunks = Math.ceil(base64.length / chunkLen);
        for (let i = 0; i < totalChunks; i++) {
          await getCollection('books').doc(ref.id).collection('pdfdata').doc('chunk_' + i).set({
            index: i, data: base64.slice(i * chunkLen, (i + 1) * chunkLen)
          });
          if (onProgress) onProgress(Math.round(((i + 1) / totalChunks) * 100));
        }
        return ref.id;
      };

      const loadBookPdf = async (bookId) => {
        const snap = await getCollection('books').doc(bookId).collection('pdfdata').get();
        const sorted = snap.docs.sort((a, b) => a.data().index - b.data().index);
        const base64 = sorted.map(doc => doc.data().data).join('');
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes.buffer;
      };

      const updateBookProgress = async (bookId, lastPage) => { await getCollection('books').doc(bookId).update({ lastPage }); };

      const deleteBook = async (bookId) => {
        const pages = await getCollection('books').doc(bookId).collection('pdfdata').get();
        const batch = db.batch();
        pages.docs.forEach(doc => batch.delete(doc.ref));
        batch.delete(getCollection('books').doc(bookId));
        await batch.commit();
      };

      const loadDrawings = async () => {
        const snap = await getCollection('drawings').orderBy('createdAt', 'desc').get();
        return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      };

      const saveDrawing = async (drawing) => {
        const ref = await getCollection('drawings').add({ ...drawing, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        return ref.id;
      };

      const deleteDrawing = async (id) => { await getCollection('drawings').doc(id).delete(); };

      return { loadEntries, saveEntry, deleteEntry, loadBooks, saveBook, loadBookPdf, updateBookProgress, deleteBook, loadDrawings, saveDrawing, deleteDrawing };
    }

    // ==================== SYNC INDICATOR ====================
    function SyncIndicator({ status }) {
      if (!status) return null;
      const info = { syncing: { bg: '#f59e0b', text: '☁️ Syncing...' }, synced: { bg: '#1D9E75', text: '✅ Synced' }, error: { bg: '#e24b4a', text: '❌ Sync Error' } };
      const s = info[status] || info.synced;
      return <div className="sync-indicator" style={{ background: s.bg, color: 'white', opacity: status === 'synced' ? 0.8 : 1 }}>{status === 'syncing' && <span className="loading-spinner" style={{ width: 14, height: 14, marginRight: 6, verticalAlign: 'middle' }}></span>}{s.text}</div>;
    }

    // ==================== DRAWING COMPONENT ====================
    function DrawingCanvas({ darkMode, userId }) {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [brushColor, setBrushColor] = useState('#000000');
      const [brushSize, setBrushSize] = useState(5);
      const [tool, setTool] = useState('brush');
      const [drawings, setDrawings] = useState([]);
      const [currentDrawingName, setCurrentDrawingName] = useState('');
      const [showSaved, setShowSaved] = useState(false);
      const [syncing, setSyncing] = useState(null);
      const [loading, setLoading] = useState(true);
      const lastPressureRef = useRef(0.5);
      const firestore = useFirestore(userId);
      const colors = ['#000000','#e24b4a','#1D9E75','#3b82f6','#f59e0b','#8b5cf6','#ec4899','#6b7280','#ffffff'];

      useEffect(() => {
        (async () => { try { setDrawings(await firestore.loadDrawings()); } catch(e) { console.error(e); } setLoading(false); })();
        const c = canvasRef.current;
        if (c) { const ctx = c.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, c.width, c.height); }
      }, []);

      const startDrawing = (e) => {
        e.preventDefault();
        const c = canvasRef.current;
        const r = c.getBoundingClientRect();
        const scaleX = c.width / r.width, scaleY = c.height / r.height;
        const x = (e.clientX - r.left) * scaleX;
        const y = (e.clientY - r.top) * scaleY;
        const ctx = c.getContext('2d');
        ctx.beginPath(); ctx.moveTo(x, y);
        setIsDrawing(true);
        lastPressureRef.current = e.pressure || 0.5;
      };
      const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const c = canvasRef.current;
        const r = c.getBoundingClientRect();
        const scaleX = c.width / r.width, scaleY = c.height / r.height;
        const x = (e.clientX - r.left) * scaleX;
        const y = (e.clientY - r.top) * scaleY;
        const pressure = e.pressure !== undefined ? e.pressure : 0.5;
        const ctx = c.getContext('2d');
        ctx.lineTo(x, y);
        ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : brushColor;
        const baseSize = tool === 'eraser' ? brushSize * 3 : brushSize;
        ctx.lineWidth = baseSize * (0.4 + pressure * 0.6);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.globalAlpha = tool === 'eraser' ? 1 : Math.max(0.3, pressure);
        ctx.stroke();
        ctx.globalAlpha = 1;
        lastPressureRef.current = pressure;
      };
      const stopDrawing = () => setIsDrawing(false);
      const clearCanvas = () => { const c = canvasRef.current; const ctx = c.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, c.width, c.height); };

      const saveDrawing = async () => {
        const name = currentDrawingName.trim() || 'Drawing ' + (drawings.length + 1);
        const img = canvasRef.current.toDataURL('image/png', 0.6);
        const d = { name, image: img, date: new Date().toLocaleString() };
        setSyncing('syncing');
        try { const id = await firestore.saveDrawing(d); setDrawings([{ id, ...d }, ...drawings]); setCurrentDrawingName(''); setSyncing('synced'); setTimeout(() => setSyncing(null), 2000); }
        catch (e) { console.error(e); setSyncing('error'); }
      };

      const loadDrawing = (d) => { const c = canvasRef.current; const ctx = c.getContext('2d'); const img = new Image(); img.onload = () => { ctx.clearRect(0, 0, c.width, c.height); ctx.drawImage(img, 0, 0); }; img.src = d.image; setShowSaved(false); };

      const handleDelete = async (id) => { setSyncing('syncing'); try { await firestore.deleteDrawing(id); setDrawings(drawings.filter(d => d.id !== id)); setSyncing('synced'); setTimeout(() => setSyncing(null), 2000); } catch(e) { setSyncing('error'); } };
      const downloadDrawing = () => { const link = document.createElement('a'); link.download = (currentDrawingName || 'my-drawing') + '.png'; link.href = canvasRef.current.toDataURL('image/png'); link.click(); };

      if (loading) return <div style={{ textAlign: 'center', padding: '3rem' }}><div className="loading-spinner" style={{ borderColor: 'rgba(29,158,117,0.3)', borderTopColor: '#1D9E75', width: 40, height: 40 }}></div><p style={{ marginTop: '1rem', color: darkMode ? '#aaa' : '#888' }}>Loading drawings...</p></div>;

      return (
        <div>
          <SyncIndicator status={syncing} />
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
            <h2 style={{ fontSize: '1.25rem', color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>🎨 Drawing Pad</h2>
            <button onClick={() => setShowSaved(!showSaved)} style={{ padding: '8px 16px', background: showSaved ? '#1D9E75' : 'transparent', color: showSaved ? 'white' : (darkMode ? '#ccc' : '#5f5e5a'), border: '1px solid ' + (showSaved ? '#1D9E75' : (darkMode ? '#555' : '#d3d1c7')), borderRadius: '6px', cursor: 'pointer', fontSize: '13px' }}>{showSaved ? '✏️ Draw' : '📁 Saved (' + drawings.length + ')'}</button>
          </div>
          {showSaved ? (
            drawings.length === 0 ? <div style={{ textAlign: 'center', padding: '3rem', color: darkMode ? '#aaa' : '#888' }}><p style={{ fontSize: '48px', marginBottom: '1rem' }}>🎨</p><p>No saved drawings yet.</p></div>
            : <div className="saved-drawings-grid">{drawings.map(d => (
              <div key={d.id} className="saved-drawing-item" style={{ background: darkMode ? '#333' : '#fff' }}>
                <img src={d.image} alt={d.name} onClick={() => loadDrawing(d)} />
                <div style={{ padding: '10px' }}>
                  <p style={{ fontSize: '13px', fontWeight: '500', color: darkMode ? '#f5f5f5' : '#2c2c2a', marginBottom: '4px' }}>{d.name}</p>
                  <p style={{ fontSize: '11px', color: darkMode ? '#888' : '#aaa', marginBottom: '8px' }}>{d.date}</p>
                  <button onClick={() => handleDelete(d.id)} style={{ padding: '4px 8px', background: '#e24b4a', color: 'white', border: 'none', borderRadius: '4px', fontSize: '11px', cursor: 'pointer' }}>Delete</button>
                </div>
              </div>
            ))}</div>
          ) : (
            <div className="drawing-canvas-container">
              <div className="drawing-toolbar" style={{ background: darkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)' }}>
                <div className="color-picker-container">
                  {colors.map(c => <div key={c} className={'color-swatch ' + (brushColor === c && tool === 'brush' ? 'active' : '')} style={{ backgroundColor: c, border: c === '#ffffff' ? '1px solid #ccc' : 'none' }} onClick={() => { setBrushColor(c); setTool('brush'); }} />)}
                  <input type="color" value={brushColor} onChange={(e) => { setBrushColor(e.target.value); setTool('brush'); }} style={{ width: 28, height: 28, border: 'none', cursor: 'pointer' }} />
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ fontSize: 12, color: darkMode ? '#ccc' : '#666' }}>Size:</span>
                  <input type="range" min="1" max="30" value={brushSize} onChange={e => setBrushSize(+e.target.value)} className="brush-size-slider" />
                  <span style={{ fontSize: 12, color: darkMode ? '#ccc' : '#666', minWidth: 20 }}>{brushSize}</span>
                </div>
                <button onClick={() => setTool('brush')} style={{ padding: '6px 12px', background: tool === 'brush' ? '#1D9E75' : (darkMode ? '#444' : '#f0f0f0'), color: tool === 'brush' ? 'white' : (darkMode ? '#ccc' : '#333'), border: 'none', borderRadius: 4, cursor: 'pointer', fontSize: 13 }}>✏️ Brush</button>
                <button onClick={() => setTool('eraser')} style={{ padding: '6px 12px', background: tool === 'eraser' ? '#1D9E75' : (darkMode ? '#444' : '#f0f0f0'), color: tool === 'eraser' ? 'white' : (darkMode ? '#ccc' : '#333'), border: 'none', borderRadius: 4, cursor: 'pointer', fontSize: 13 }}>🧹 Eraser</button>
                <button onClick={clearCanvas} style={{ padding: '6px 12px', background: darkMode ? '#444' : '#f0f0f0', color: darkMode ? '#ccc' : '#333', border: 'none', borderRadius: 4, cursor: 'pointer', fontSize: 13 }}>🗑️ Clear</button>
              </div>
              <canvas ref={canvasRef} width={760} height={450} style={{ display: 'block', cursor: tool === 'eraser' ? 'cell' : 'crosshair', touchAction: 'none', width: '100%' }} onPointerDown={startDrawing} onPointerMove={draw} onPointerUp={stopDrawing} onPointerLeave={stopDrawing} onPointerCancel={stopDrawing} />
              <div style={{ padding: 15, display: 'flex', gap: 10, alignItems: 'center', background: darkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)', borderTop: '1px solid ' + (darkMode ? '#444' : '#e0ddd5') }}>
                <input type="text" placeholder="Drawing name..." value={currentDrawingName} onChange={e => setCurrentDrawingName(e.target.value)} style={{ flex: 1, padding: '8px 12px', border: '1px solid ' + (darkMode ? '#555' : '#d3d1c7'), borderRadius: 6, background: darkMode ? '#333' : '#fff', color: darkMode ? '#f5f5f5' : '#2c2c2a', fontSize: 14 }} />
                <button onClick={saveDrawing} style={{ padding: '8px 20px', background: '#1D9E75', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14, fontWeight: 500 }}>💾 Save</button>
                <button onClick={downloadDrawing} style={{ padding: '8px 16px', background: darkMode ? '#444' : '#f0f0f0', color: darkMode ? '#ccc' : '#333', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14 }}>⬇️ Download</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==================== BOOK READER (Canvas Page Curl) ====================
    function BookReader({ darkMode, userId }) {
      const [books, setBooks] = useState([]);
      const [currentBook, setCurrentBook] = useState(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [totalPages, setTotalPages] = useState(0);
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(null);
      const [importing, setImporting] = useState(false);
      const [importProgress, setImportProgress] = useState('');
      const [isMaximized, setIsMaximized] = useState(false);
      const [pageImages, setPageImages] = useState({});
      const [pdfDoc, setPdfDoc] = useState(null);
      const fileInputRef = useRef(null);
      const firestore = useFirestore(userId);

      // Canvas refs
      const canvasRef = useRef(null);
      const bookWrapperRef = useRef(null);
      const animRef = useRef(null);
      const flipStateRef = useRef(null); // { progress: 0-1, direction: 'next'|'prev', dragging: bool, startX, velocity }
      const pageImgCacheRef = useRef({}); // cached Image objects for canvas drawing
      const currentPageRef = useRef(0); // avoid stale closure in animation ticks

      useEffect(() => { (async () => { try { setBooks(await firestore.loadBooks()); } catch(e) { console.error(e); } setLoading(false); })(); }, []);

      // ---- PDF rendering ----
      const renderPage = async (pdf, pageNum, scale = 1.5) => {
        const page = await pdf.getPage(pageNum + 1);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width; canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        return canvas.toDataURL('image/jpeg', 0.85);
      };

      const loadVisiblePages = async (pdf, current) => {
        const needed = [current, current + 1, current + 2, current + 3, current - 1, current - 2].filter(p => p >= 0 && p < pdf.numPages && !pageImages[p]);
        if (needed.length === 0) return;
        const newImages = { ...pageImages };
        for (const p of needed) { newImages[p] = await renderPage(pdf, p, isMaximized ? 2.0 : 1.5); }
        setPageImages(newImages);
      };

      // Keep ref in sync with state
      useEffect(() => { currentPageRef.current = currentPage; }, [currentPage]);

      useEffect(() => { if (pdfDoc) loadVisiblePages(pdfDoc, currentPage); }, [currentPage, pdfDoc, isMaximized]);

      // ---- Convert data URLs to Image objects for canvas ----
      const getPageImg = useCallback((idx) => {
        if (idx < 0 || idx >= totalPages) return null;
        const src = pageImages[idx];
        if (!src) return null;
        if (pageImgCacheRef.current[idx] && pageImgCacheRef.current[idx]._src === src) return pageImgCacheRef.current[idx];
        const img = new Image();
        img.src = src;
        img._src = src;
        pageImgCacheRef.current[idx] = img;
        return img.complete ? img : null;
      }, [pageImages, totalPages]);

      // ---- Canvas page curl drawing engine ----
      const offscreenRef = useRef(null);

      const drawBook = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas || !canvas._logicalW) return;
        const W = canvas._logicalW, H = canvas._logicalH;
        const halfW = W / 2;
        const fs = flipStateRef.current;
        const cp = currentPageRef.current; // always fresh, no stale closure
        const li = cp, ri = cp + 1;

        // Double-buffer: draw to offscreen canvas first
        if (!offscreenRef.current) offscreenRef.current = document.createElement('canvas');
        const off = offscreenRef.current;
        if (off.width !== canvas.width || off.height !== canvas.height) {
          off.width = canvas.width; off.height = canvas.height;
        }
        const ctx = off.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);

        // Paper color
        const paperColor = '#fffdf7';
        const paperEdge = '#efe9de';

        // Draw a page image into a region
        const drawPageImage = (img, x, y, w, h, clipFn) => {
          ctx.save();
          if (clipFn) clipFn();
          if (img && img.complete && img.naturalWidth > 0) {
            // Maintain aspect ratio, center
            const imgAr = img.naturalWidth / img.naturalHeight;
            const boxAr = w / h;
            let dw, dh, dx, dy;
            if (imgAr > boxAr) { dw = w * 0.92; dh = dw / imgAr; } else { dh = h * 0.92; dw = dh * imgAr; }
            dx = x + (w - dw) / 2; dy = y + (h - dh) / 2;
            ctx.drawImage(img, dx, dy, dw, dh);
          }
          ctx.restore();
        };

        // ---- Draw static left page ----
        const drawLeftPage = (pageIdx) => {
          ctx.save();
          ctx.beginPath(); ctx.rect(0, 0, halfW, H); ctx.clip();
          // Page background
          const lgLeft = ctx.createLinearGradient(0, 0, halfW, 0);
          lgLeft.addColorStop(0, paperEdge); lgLeft.addColorStop(0.15, paperColor); lgLeft.addColorStop(1, paperColor);
          ctx.fillStyle = lgLeft; ctx.fillRect(0, 0, halfW, H);
          drawPageImage(getPageImg(pageIdx), 0, 0, halfW, H);
          // Spine shadow on left edge
          const spineGrad = ctx.createLinearGradient(0, 0, 30, 0);
          spineGrad.addColorStop(0, 'rgba(0,0,0,0.06)'); spineGrad.addColorStop(1, 'transparent');
          ctx.fillStyle = spineGrad; ctx.fillRect(0, 0, 30, H);
          // Inner spine shadow
          const innerGrad = ctx.createLinearGradient(halfW - 15, 0, halfW, 0);
          innerGrad.addColorStop(0, 'transparent'); innerGrad.addColorStop(1, 'rgba(0,0,0,0.04)');
          ctx.fillStyle = innerGrad; ctx.fillRect(halfW - 15, 0, 15, H);
          // Page number - clear badge at bottom
          ctx.font = '600 13px "EB Garamond", serif';
          const pnText = String(pageIdx + 1);
          const pnW = ctx.measureText(pnText).width + 16;
          const pnX = 14;
          const pnY = H - 28;
          ctx.fillStyle = 'rgba(139,115,85,0.12)';
          ctx.beginPath();
          ctx.roundRect(pnX, pnY, pnW, 20, 4);
          ctx.fill();
          ctx.fillStyle = '#5a4a38';
          ctx.textAlign = 'center';
          ctx.fillText(pnText, pnX + pnW / 2, pnY + 15);
          ctx.textAlign = 'start';
          ctx.restore();
        };

        // ---- Draw static right page ----
        const drawRightPage = (pageIdx) => {
          ctx.save();
          ctx.beginPath(); ctx.rect(halfW, 0, halfW, H); ctx.clip();
          const lgRight = ctx.createLinearGradient(W, 0, halfW, 0);
          lgRight.addColorStop(0, paperEdge); lgRight.addColorStop(0.15, paperColor); lgRight.addColorStop(1, paperColor);
          ctx.fillStyle = lgRight; ctx.fillRect(halfW, 0, halfW, H);
          drawPageImage(getPageImg(pageIdx), halfW, 0, halfW, H);
          // Edge shadow
          const edgeGrad = ctx.createLinearGradient(W - 30, 0, W, 0);
          edgeGrad.addColorStop(0, 'transparent'); edgeGrad.addColorStop(1, 'rgba(0,0,0,0.06)');
          ctx.fillStyle = edgeGrad; ctx.fillRect(W - 30, 0, 30, H);
          // Inner spine shadow
          const innerGrad = ctx.createLinearGradient(halfW, 0, halfW + 15, 0);
          innerGrad.addColorStop(0, 'rgba(0,0,0,0.04)'); innerGrad.addColorStop(1, 'transparent');
          ctx.fillStyle = innerGrad; ctx.fillRect(halfW, 0, 15, H);
          // Page number
          if (pageIdx < totalPages) {
            ctx.font = '600 13px "EB Garamond", serif';
            const pnText = String(pageIdx + 1);
            const pnW = ctx.measureText(pnText).width + 16;
            const pnX = W - 14 - pnW;
            const pnY = H - 28;
            ctx.fillStyle = 'rgba(139,115,85,0.12)';
            ctx.beginPath();
            ctx.roundRect(pnX, pnY, pnW, 20, 4);
            ctx.fill();
            ctx.fillStyle = '#5a4a38';
            ctx.textAlign = 'center';
            ctx.fillText(pnText, pnX + pnW / 2, pnY + 15);
            ctx.textAlign = 'start';
          } else {
            ctx.font = '18px "EB Garamond", serif';
            ctx.fillStyle = '#888';
            ctx.textAlign = 'center';
            ctx.fillText('✨ The End ✨', halfW + halfW / 2, H / 2);
          }
          ctx.restore();
        };

        // ---- Draw page curl (solid base + gradient bend, no strip gaps) ----
        const drawPageCurl = (progress, direction) => {
          if (progress <= 0.001 || progress >= 0.999) return;
          const t = progress;
          const curlAmount = Math.sin(t * Math.PI);

          if (direction === 'next') {
            const foldX = halfW + halfW * (1 - t);
            const backImg = getPageImg(ri + 1);
            const regionLeft = Math.max(0, 2 * foldX - W);
            const regionW = foldX - regionLeft;

            // 1. Shadow on underlying right page
            ctx.save();
            ctx.beginPath(); ctx.rect(foldX, 0, W - foldX, H); ctx.clip();
            const sw = 15 + curlAmount * 40;
            const sg = ctx.createLinearGradient(foldX, 0, foldX + sw, 0);
            sg.addColorStop(0, 'rgba(0,0,0,' + (0.35 * curlAmount) + ')');
            sg.addColorStop(0.4, 'rgba(0,0,0,' + (0.1 * curlAmount) + ')');
            sg.addColorStop(1, 'transparent');
            ctx.fillStyle = sg; ctx.fillRect(foldX, 0, sw, H);
            ctx.restore();

            // Shadow on left page when past spine
            if (t > 0.45) {
              ctx.save();
              ctx.beginPath(); ctx.rect(0, 0, halfW, H); ctx.clip();
              const lp = (t - 0.45) / 0.55;
              const lsw = halfW * lp * 0.35;
              const lsg = ctx.createLinearGradient(halfW, 0, halfW - lsw, 0);
              lsg.addColorStop(0, 'rgba(0,0,0,' + (0.18 * lp) + ')');
              lsg.addColorStop(1, 'transparent');
              ctx.fillStyle = lsg; ctx.fillRect(halfW - lsw, 0, lsw, H);
              ctx.restore();
            }

            // 2. Solid opaque curled page (no strips = no gaps)
            ctx.save();
            ctx.beginPath(); ctx.rect(regionLeft, 0, regionW, H); ctx.clip();

            // Opaque paper base
            ctx.fillStyle = '#faf7f0';
            ctx.fillRect(regionLeft, 0, regionW, H);

            // Draw back page image (mirrored horizontally across foldX)
            if (backImg && backImg.complete && backImg.naturalWidth > 0) {
              const imgAr = backImg.naturalWidth / backImg.naturalHeight;
              const boxAr = halfW / H;
              let dw, dh;
              if (imgAr > boxAr) { dw = halfW * 0.92; dh = dw / imgAr; }
              else { dh = H * 0.92; dw = dh * imgAr; }
              const imgDy = (H - dh) / 2;
              ctx.save();
              ctx.translate(foldX, 0);
              ctx.scale(-1, 1);
              const imgDx = (halfW - dw) / 2;
              ctx.drawImage(backImg, imgDx, imgDy, dw, dh);
              ctx.restore();
            }

            // 3. Cylindrical bend gradient (3D illusion without strip gaps)
            const bendG = ctx.createLinearGradient(regionLeft, 0, foldX, 0);
            bendG.addColorStop(0, 'rgba(0,0,0,' + (0.04 * curlAmount) + ')');
            bendG.addColorStop(0.15, 'transparent');
            bendG.addColorStop(0.35, 'rgba(255,255,255,' + (0.12 * curlAmount) + ')');
            bendG.addColorStop(0.5, 'rgba(0,0,0,' + (0.02 * curlAmount) + ')');
            bendG.addColorStop(0.7, 'rgba(255,255,255,' + (0.15 * curlAmount) + ')');
            bendG.addColorStop(0.88, 'rgba(0,0,0,' + (0.06 * curlAmount) + ')');
            bendG.addColorStop(0.96, 'rgba(255,255,255,' + (0.08 * curlAmount) + ')');
            bendG.addColorStop(1, 'rgba(0,0,0,' + (0.15 * curlAmount) + ')');
            ctx.fillStyle = bendG;
            ctx.fillRect(regionLeft, 0, regionW, H);

            ctx.restore();

            // 4. Fold edge (solid paper thickness)
            ctx.save();
            const ew = 5 + curlAmount * 10;
            // Dark shadow line at fold crease
            ctx.fillStyle = 'rgba(60,40,20,0.25)';
            ctx.fillRect(foldX - 1, 0, 2, H);
            // Paper stack layers
            const eg = ctx.createLinearGradient(foldX, 0, foldX + ew, 0);
            eg.addColorStop(0, '#d4c8b0');
            eg.addColorStop(0.08, '#e8dfd0');
            eg.addColorStop(0.2, '#faf5ea');
            eg.addColorStop(0.35, '#ece5d5');
            eg.addColorStop(0.5, '#faf7f0');
            eg.addColorStop(0.65, '#eee7d8');
            eg.addColorStop(0.8, '#f8f3e8');
            eg.addColorStop(0.92, '#e5ddd0');
            eg.addColorStop(1, 'rgba(180,160,130,0.4)');
            ctx.fillStyle = eg;
            ctx.fillRect(foldX, 0, ew, H);
            // Subtle horizontal page lines within edge
            ctx.strokeStyle = 'rgba(0,0,0,0.04)';
            ctx.lineWidth = 0.5;
            for (let ly = 8; ly < H; ly += 4) {
              ctx.beginPath(); ctx.moveTo(foldX + 1, ly); ctx.lineTo(foldX + ew - 1, ly); ctx.stroke();
            }
            ctx.restore();

          } else {
            // prev: Fold line sweeps from left edge toward spine
            const foldX = halfW * t;
            const backImg = getPageImg(li - 1);
            const regionRight = Math.min(W, 2 * foldX);
            const regionW = regionRight - foldX;

            // 1. Shadow on underlying left page
            ctx.save();
            ctx.beginPath(); ctx.rect(0, 0, foldX, H); ctx.clip();
            const sw = 15 + curlAmount * 40;
            const sg = ctx.createLinearGradient(foldX, 0, foldX - sw, 0);
            sg.addColorStop(0, 'rgba(0,0,0,' + (0.35 * curlAmount) + ')');
            sg.addColorStop(0.4, 'rgba(0,0,0,' + (0.1 * curlAmount) + ')');
            sg.addColorStop(1, 'transparent');
            ctx.fillStyle = sg; ctx.fillRect(foldX - sw, 0, sw, H);
            ctx.restore();

            // Shadow on right page when past spine
            if (t > 0.45) {
              ctx.save();
              ctx.beginPath(); ctx.rect(halfW, 0, halfW, H); ctx.clip();
              const rp = (t - 0.45) / 0.55;
              const rsw = halfW * rp * 0.35;
              const rsg = ctx.createLinearGradient(halfW, 0, halfW + rsw, 0);
              rsg.addColorStop(0, 'rgba(0,0,0,' + (0.18 * rp) + ')');
              rsg.addColorStop(1, 'transparent');
              ctx.fillStyle = rsg; ctx.fillRect(halfW, 0, rsw, H);
              ctx.restore();
            }

            // 2. Solid opaque curled page
            ctx.save();
            ctx.beginPath(); ctx.rect(foldX, 0, regionW, H); ctx.clip();

            // Opaque paper base
            ctx.fillStyle = '#faf7f0';
            ctx.fillRect(foldX, 0, regionW, H);

            // Draw back page image (mirrored)
            if (backImg && backImg.complete && backImg.naturalWidth > 0) {
              const imgAr = backImg.naturalWidth / backImg.naturalHeight;
              const boxAr = halfW / H;
              let dw, dh;
              if (imgAr > boxAr) { dw = halfW * 0.92; dh = dw / imgAr; }
              else { dh = H * 0.92; dw = dh * imgAr; }
              const imgDy = (H - dh) / 2;
              ctx.save();
              ctx.translate(foldX, 0);
              ctx.scale(-1, 1);
              const imgDx = -(halfW - (halfW - dw) / 2);
              ctx.drawImage(backImg, imgDx, imgDy, dw, dh);
              ctx.restore();
            }

            // 3. Cylindrical bend gradient
            const bendG = ctx.createLinearGradient(foldX, 0, regionRight, 0);
            bendG.addColorStop(0, 'rgba(0,0,0,' + (0.15 * curlAmount) + ')');
            bendG.addColorStop(0.04, 'rgba(255,255,255,' + (0.08 * curlAmount) + ')');
            bendG.addColorStop(0.12, 'rgba(0,0,0,' + (0.06 * curlAmount) + ')');
            bendG.addColorStop(0.3, 'rgba(255,255,255,' + (0.15 * curlAmount) + ')');
            bendG.addColorStop(0.5, 'rgba(0,0,0,' + (0.02 * curlAmount) + ')');
            bendG.addColorStop(0.65, 'rgba(255,255,255,' + (0.12 * curlAmount) + ')');
            bendG.addColorStop(0.85, 'transparent');
            bendG.addColorStop(1, 'rgba(0,0,0,' + (0.04 * curlAmount) + ')');
            ctx.fillStyle = bendG;
            ctx.fillRect(foldX, 0, regionW, H);

            ctx.restore();

            // 4. Fold edge (solid paper thickness)
            ctx.save();
            const ew = 5 + curlAmount * 10;
            // Dark shadow line at fold crease
            ctx.fillStyle = 'rgba(60,40,20,0.25)';
            ctx.fillRect(foldX - 1, 0, 2, H);
            // Paper stack layers
            const eg = ctx.createLinearGradient(foldX - ew, 0, foldX, 0);
            eg.addColorStop(0, 'rgba(180,160,130,0.4)');
            eg.addColorStop(0.08, '#e5ddd0');
            eg.addColorStop(0.2, '#f8f3e8');
            eg.addColorStop(0.35, '#eee7d8');
            eg.addColorStop(0.5, '#faf7f0');
            eg.addColorStop(0.65, '#ece5d5');
            eg.addColorStop(0.8, '#faf5ea');
            eg.addColorStop(0.92, '#e8dfd0');
            eg.addColorStop(1, '#d4c8b0');
            ctx.fillStyle = eg;
            ctx.fillRect(foldX - ew, 0, ew, H);
            // Subtle horizontal page lines within edge
            ctx.strokeStyle = 'rgba(0,0,0,0.04)';
            ctx.lineWidth = 0.5;
            for (let ly = 8; ly < H; ly += 4) {
              ctx.beginPath(); ctx.moveTo(foldX - ew + 1, ly); ctx.lineTo(foldX - 1, ly); ctx.stroke();
            }
            ctx.restore();
          }
        };

        // ---- Book spine ----
        const drawSpine = () => {
          const spineW = 6;
          const sx = halfW - spineW / 2;
          const spineGrad = ctx.createLinearGradient(sx, 0, sx + spineW, 0);
          spineGrad.addColorStop(0, '#5a3a1a');
          spineGrad.addColorStop(0.3, '#8B4513');
          spineGrad.addColorStop(0.5, '#A0522D');
          spineGrad.addColorStop(0.7, '#8B4513');
          spineGrad.addColorStop(1, '#5a3a1a');
          ctx.fillStyle = spineGrad;
          ctx.fillRect(sx, 0, spineW, H);
          // Spine shadow (subtle)
          ctx.shadowColor = 'rgba(0,0,0,0.3)';
          ctx.shadowBlur = 8;
          ctx.fillRect(sx, 0, spineW, H);
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
        };

        // ---- Compose the scene ----
        if (fs && fs.progress > 0.001 && fs.progress < 0.999) {
          if (fs.direction === 'next') {
            drawLeftPage(li);
            drawRightPage(ri + 2 < totalPages ? ri + 2 : totalPages);
            drawSpine();
            // Draw curl ON TOP of spine so spine is hidden under the curled page
            drawPageCurl(fs.progress, 'next');
          } else {
            drawLeftPage(li - 2 >= 0 ? li - 2 : 0);
            drawRightPage(ri);
            drawSpine();
            drawPageCurl(fs.progress, 'prev');
          }
        } else {
          drawLeftPage(li);
          drawRightPage(ri);
          drawSpine();
        }

        // Blit offscreen to visible canvas in one atomic operation (no flicker)
        const visCtx = canvas.getContext('2d');
        visCtx.setTransform(1, 0, 0, 1, 0, 0);
        visCtx.drawImage(off, 0, 0);
      }, [totalPages, getPageImg]);

      // ---- Resize canvas to match wrapper ----
      const updateCanvasSize = useCallback(() => {
        const wrapper = bookWrapperRef.current;
        const canvas = canvasRef.current;
        if (!wrapper || !canvas) return;
        const dpr = window.devicePixelRatio || 1;
        const rect = wrapper.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // reset then scale (avoids cumulative scale)
        // Store logical size for drawing
        canvas._logicalW = rect.width;
        canvas._logicalH = rect.height;
        drawBook();
      }, [drawBook]);

      useEffect(() => {
        if (currentBook) {
          setTimeout(updateCanvasSize, 50);
          window.addEventListener('resize', updateCanvasSize);
          return () => window.removeEventListener('resize', updateCanvasSize);
        }
      }, [currentBook, updateCanvasSize, isMaximized]);

      // Redraw when pages load or page changes
      useEffect(() => { if (currentBook && !flipStateRef.current) drawBook(); }, [pageImages, currentPage, currentBook]);

      // ---- Animation loop for smooth flip ----
      const animateFlip = useCallback((direction, onComplete) => {
        const duration = 700; // ms
        const startTime = performance.now();
        flipStateRef.current = { progress: 0, direction, dragging: false };
        
        const tick = (now) => {
          const elapsed = now - startTime;
          let t = Math.min(1, elapsed / duration);
          // Ease in-out cubic
          t = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
          flipStateRef.current = { ...flipStateRef.current, progress: t };
          drawBook();
          if (elapsed < duration) {
            animRef.current = requestAnimationFrame(tick);
          } else {
            flipStateRef.current = null;
            if (onComplete) onComplete();
            // Safe to call - drawBook uses currentPageRef (always fresh)
            drawBook();
          }
        };
        animRef.current = requestAnimationFrame(tick);
      }, [drawBook]);

      // ---- Turn page with animation ----
      const turnPage = useCallback((dir) => {
        if (flipStateRef.current) return; // already flipping
        if (dir === 'next' && currentPage < totalPages - 2) {
          // Preload
          const np = currentPage + 2;
          if (pdfDoc && !pageImages[np]) renderPage(pdfDoc, np, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [np]: img})));
          if (pdfDoc && !pageImages[np+1]) renderPage(pdfDoc, np+1, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [np+1]: img})));
          animateFlip('next', () => setCurrentPage(p => Math.min(p + 2, totalPages - 1)));
        } else if (dir === 'prev' && currentPage > 0) {
          const pp = currentPage - 2;
          if (pdfDoc && pp >= 0 && !pageImages[pp]) renderPage(pdfDoc, pp, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [pp]: img})));
          if (pdfDoc && pp+1 >= 0 && !pageImages[pp+1]) renderPage(pdfDoc, pp+1, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [pp+1]: img})));
          animateFlip('prev', () => setCurrentPage(p => Math.max(p - 2, 0)));
        }
      }, [currentPage, totalPages, pdfDoc, pageImages, isMaximized, animateFlip]);

      // ---- Drag/touch handlers ----
      const dragRef = useRef(null);

      const handlePointerDown = useCallback((e) => {
        if (flipStateRef.current) return;
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX);
        const relX = x - rect.left;
        const mid = rect.width / 2;
        let dir = null;
        if (relX > mid && currentPage < totalPages - 2) dir = 'next';
        else if (relX <= mid && currentPage > 0) dir = 'prev';
        if (!dir) return;
        if (e.cancelable) e.preventDefault();
        // Preload pages
        if (dir === 'next') {
          const np = currentPage + 2;
          if (pdfDoc && !pageImages[np]) renderPage(pdfDoc, np, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [np]: img})));
          if (pdfDoc && !pageImages[np+1]) renderPage(pdfDoc, np+1, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [np+1]: img})));
        } else {
          const pp = currentPage - 2;
          if (pdfDoc && pp >= 0 && !pageImages[pp]) renderPage(pdfDoc, pp, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [pp]: img})));
          if (pdfDoc && pp+1 >= 0 && !pageImages[pp+1]) renderPage(pdfDoc, pp+1, isMaximized ? 2.0 : 1.5).then(img => setPageImages(prev => ({...prev, [pp+1]: img})));
        }
        dragRef.current = { startX: x, currentX: x, direction: dir, width: rect.width, lastX: x, lastTime: Date.now(), velocity: 0 };
        flipStateRef.current = { progress: 0.001, direction: dir, dragging: true };
        canvas.classList.add('dragging');
      }, [currentPage, totalPages, pdfDoc, pageImages, isMaximized]);

      useEffect(() => {
        const onMove = (e) => {
          if (!dragRef.current) return;
          if (e.cancelable) e.preventDefault();
          const x = (e.touches ? e.touches[0].clientX : e.clientX);
          const now = Date.now();
          const dt = now - dragRef.current.lastTime;
          if (dt > 0) dragRef.current.velocity = (x - dragRef.current.lastX) / dt;
          dragRef.current.currentX = x;
          dragRef.current.lastX = x;
          dragRef.current.lastTime = now;
          
          const dx = x - dragRef.current.startX;
          const halfW = dragRef.current.width / 2;
          let progress;
          if (dragRef.current.direction === 'next') {
            progress = Math.max(0.001, Math.min(0.999, -dx / halfW));
          } else {
            progress = Math.max(0.001, Math.min(0.999, dx / halfW));
          }
          flipStateRef.current = { progress, direction: dragRef.current.direction, dragging: true };
          drawBook();
        };

        const onEnd = () => {
          if (!dragRef.current) return;
          const d = dragRef.current;
          const dx = d.currentX - d.startX;
          const threshold = d.width * 0.12;
          const velocityThreshold = 0.3;
          const shouldFlip =
            (d.direction === 'next' && (dx < -threshold || d.velocity < -velocityThreshold)) ||
            (d.direction === 'prev' && (dx > threshold || d.velocity > velocityThreshold));

          const currentProgress = flipStateRef.current ? flipStateRef.current.progress : 0;
          const dir = d.direction;
          dragRef.current = null;
          canvasRef.current?.classList.remove('dragging');

          if (shouldFlip) {
            // Animate from current progress to 1
            const remaining = 1 - currentProgress;
            const duration = Math.max(150, remaining * 500);
            const startTime = performance.now();
            const startP = currentProgress;
            const tick = (now) => {
              const elapsed = now - startTime;
              let t = Math.min(1, elapsed / duration);
              t = 1 - Math.pow(1 - t, 3); // ease out
              const p = startP + (1 - startP) * t;
              flipStateRef.current = { progress: p, direction: dir, dragging: false };
              drawBook();
              if (elapsed < duration) {
                animRef.current = requestAnimationFrame(tick);
              } else {
                flipStateRef.current = null;
                setCurrentPage(prev => dir === 'next' ? Math.min(prev + 2, totalPages - 1) : Math.max(prev - 2, 0));
              }
            };
            animRef.current = requestAnimationFrame(tick);
          } else {
            // Snap back
            const duration = Math.max(150, currentProgress * 400);
            const startTime = performance.now();
            const startP = currentProgress;
            const tick = (now) => {
              const elapsed = now - startTime;
              let t = Math.min(1, elapsed / duration);
              t = 1 - Math.pow(1 - t, 3);
              const p = startP * (1 - t);
              flipStateRef.current = { progress: p, direction: dir, dragging: false };
              drawBook();
              if (elapsed < duration) {
                animRef.current = requestAnimationFrame(tick);
              } else {
                flipStateRef.current = null;
                // Redraw static pages after snap back (no setCurrentPage triggers re-render)
                requestAnimationFrame(() => drawBook());
              }
            };
            animRef.current = requestAnimationFrame(tick);
          }
        };

        window.addEventListener('mousemove', onMove, { passive: false });
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onEnd);
        return () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onEnd);
          window.removeEventListener('touchmove', onMove);
          window.removeEventListener('touchend', onEnd);
          if (animRef.current) cancelAnimationFrame(animRef.current);
        };
      }, [drawBook, totalPages]);

      // ---- File upload ----
      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') { alert('Please select a PDF file'); return; }
        setImporting(true); setImportProgress('Reading PDF...');
        const reader = new FileReader();
        reader.onload = async (ev) => {
          try {
            setImportProgress('Parsing PDF...');
            const arrayBuf = ev.target.result;
            const pdfBytes = new Uint8Array(arrayBuf);
            const pdfBytesCopy = new Uint8Array(pdfBytes);
            const pdf = await window.pdfjsLib.getDocument({ data: pdfBytesCopy }).promise;
            let binary = '';
            const chunkSize = 8192;
            for (let i = 0; i < pdfBytes.length; i += chunkSize) { binary += String.fromCharCode.apply(null, pdfBytes.subarray(i, i + chunkSize)); }
            const pdfBase64 = btoa(binary);
            const bookData = { name: file.name.replace('.pdf', ''), totalPages: pdf.numPages, pdfBase64, lastPage: 0, addedDate: new Date().toLocaleString() };
            setSyncing('syncing'); setImportProgress('Uploading to cloud...');
            const id = await firestore.saveBook(bookData, (pct) => setImportProgress('Uploading... ' + pct + '%'));
            setBooks([{ id, name: bookData.name, totalPages: bookData.totalPages, lastPage: 0, addedDate: bookData.addedDate }, ...books]);
            setSyncing('synced'); setTimeout(() => setSyncing(null), 2000);
          } catch (err) { console.error('PDF Import Error:', err); alert('Error loading PDF: ' + (err.message || err)); setSyncing('error'); }
          setImporting(false); setImportProgress('');
        };
        reader.onerror = () => { alert('Error reading file.'); setImporting(false); setImportProgress(''); };
        reader.readAsArrayBuffer(file); e.target.value = '';
      };

      const openBook = async (book) => {
        setLoading(true);
        try {
          const pdfData = await firestore.loadBookPdf(book.id);
          const pdf = await window.pdfjsLib.getDocument({ data: new Uint8Array(pdfData) }).promise;
          setPdfDoc(pdf); setPageImages({}); pageImgCacheRef.current = {};
          setCurrentBook(book); setTotalPages(pdf.numPages); setCurrentPage(book.lastPage || 0);
        } catch(e) { console.error(e); alert('Error loading book: ' + (e.message || e)); }
        setLoading(false);
      };

      const closeBook = async () => {
        if (currentBook) { try { await firestore.updateBookProgress(currentBook.id, currentPage); setBooks(books.map(b => b.id === currentBook.id ? { ...b, lastPage: currentPage } : b)); } catch(e) {} }
        setCurrentBook(null); setPdfDoc(null); setPageImages({}); pageImgCacheRef.current = {}; setIsMaximized(false);
        if (animRef.current) cancelAnimationFrame(animRef.current);
        flipStateRef.current = null;
      };

      const handleDelete = async (id) => { setSyncing('syncing'); try { await firestore.deleteBook(id); setBooks(books.filter(b => b.id !== id)); setSyncing('synced'); setTimeout(() => setSyncing(null), 2000); } catch(e) { setSyncing('error'); } };

      if (loading) return <div style={{ textAlign: 'center', padding: '3rem' }}><div className="loading-spinner" style={{ borderColor: 'rgba(29,158,117,0.3)', borderTopColor: '#1D9E75', width: 40, height: 40 }}></div><p style={{ marginTop: '1rem', color: darkMode ? '#aaa' : '#888' }}>{currentBook ? 'Loading book...' : 'Loading library...'}</p></div>;

      if (!currentBook) {
        return (
          <div>
            <SyncIndicator status={syncing} />
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
              <h2 style={{ fontSize: '1.25rem', color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>📚 My Book Library</h2>
              <button onClick={() => fileInputRef.current?.click()} disabled={importing} style={{ padding: '10px 20px', background: '#1D9E75', color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 14, fontWeight: 500, opacity: importing ? 0.6 : 1 }}>{importing ? ('⏳ ' + (importProgress || 'Importing...')) : '📄 Import PDF Book'}</button>
              <input ref={fileInputRef} type="file" accept=".pdf" onChange={handleFileUpload} style={{ display: 'none' }} />
            </div>
            {books.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '3rem', color: darkMode ? '#aaa' : '#888' }}>
                <p style={{ fontSize: 64, marginBottom: '1rem' }}>📚</p>
                <p style={{ fontSize: 16, marginBottom: '0.5rem' }}>Your library is empty</p>
                <p style={{ fontSize: 14 }}>Import a PDF book to start reading!</p>
                <p style={{ fontSize: 12, marginTop: '1rem', color: '#1D9E75' }}>☁️ Books sync across all your devices</p>
              </div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: '1.5rem' }}>
                {books.map(book => (
                  <div key={book.id} style={{ background: darkMode ? '#333' : '#fff', borderRadius: 12, overflow: 'hidden', border: '1px solid ' + (darkMode ? '#444' : '#e0ddd5'), transition: 'all 0.2s', cursor: 'pointer' }}
                    onMouseOver={e => { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = '0 8px 25px rgba(0,0,0,0.15)'; }}
                    onMouseOut={e => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = 'none'; }}>
                    <div onClick={() => openBook(book)} style={{ height: 160, background: 'linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #654321 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
                      <div style={{ background: 'rgba(255,255,255,0.9)', padding: '15px 10px', borderRadius: 4, textAlign: 'center', maxWidth: '80%' }}>
                        <p style={{ fontSize: 12, fontWeight: 600, color: '#333', wordBreak: 'break-word' }}>{book.name}</p>
                      </div>
                      {book.lastPage > 0 && <div style={{ position: 'absolute', top: 8, right: 8, background: '#1D9E75', color: 'white', padding: '2px 8px', borderRadius: 10, fontSize: 10 }}>Page {book.lastPage + 1}</div>}
                    </div>
                    <div style={{ padding: 12 }}>
                      <p style={{ fontSize: 14, fontWeight: 500, color: darkMode ? '#f5f5f5' : '#2c2c2a', marginBottom: 4 }}>{book.name.length > 20 ? book.name.substring(0, 20) + '...' : book.name}</p>
                      <p style={{ fontSize: 11, color: darkMode ? '#888' : '#aaa', marginBottom: 8 }}>{book.totalPages} pages</p>
                      <div style={{ display: 'flex', gap: 8 }}>
                        <button onClick={e => { e.stopPropagation(); openBook(book); }} style={{ flex: 1, padding: 6, background: '#1D9E75', color: 'white', border: 'none', borderRadius: 4, fontSize: 12, cursor: 'pointer' }}>📖 Read</button>
                        <button onClick={e => { e.stopPropagation(); handleDelete(book.id); }} style={{ padding: '6px 10px', background: '#e24b4a', color: 'white', border: 'none', borderRadius: 4, fontSize: 12, cursor: 'pointer' }}>🗑️</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      const li = currentPage, ri = currentPage + 1;

      return (
        <div className={isMaximized ? 'book-maximized' : ''}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: isMaximized ? 0 : '1rem', flexWrap: 'wrap', gap: '0.5rem', padding: isMaximized ? '8px 20px' : 0, background: isMaximized ? 'rgba(30,25,20,0.9)' : 'transparent' }}>
            <button onClick={closeBook} style={{ padding: '7px 14px', background: 'transparent', color: isMaximized ? '#ccc' : (darkMode ? '#ccc' : '#5f5e5a'), border: '1px solid ' + (isMaximized || darkMode ? '#555' : '#d3d1c7'), borderRadius: 6, cursor: 'pointer', fontSize: 13 }}>← Back</button>
            <h3 style={{ fontSize: '0.85rem', color: isMaximized ? '#e8e0d0' : (darkMode ? '#f5f5f5' : '#2c2c2a'), flex: 1, textAlign: 'center', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontFamily: 'EB Garamond, serif', letterSpacing: 0.5 }}>📖 {currentBook.name}</h3>
            <button onClick={() => { setIsMaximized(!isMaximized); setPageImages({}); pageImgCacheRef.current = {}; setTimeout(updateCanvasSize, 100); }} style={{ padding: '7px 14px', background: '#1D9E75', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 13 }}>{isMaximized ? '🗗 Minimize' : '🗖 Maximize'}</button>
          </div>
          <div className="book-container" style={isMaximized ? { flex: 1, minHeight: 0, alignItems: 'center' } : {}}>
            <button className="nav-arrow" onClick={() => turnPage('prev')} disabled={currentPage === 0 || !!flipStateRef.current}>◀</button>
            <div className={'book-wrapper' + (isMaximized ? ' maximized' : '')} ref={bookWrapperRef}>
              <canvas ref={canvasRef} className="book-canvas"
                onMouseDown={handlePointerDown} onTouchStart={handlePointerDown} />
              <div className="book-shadow"></div>
            </div>
            <button className="nav-arrow" onClick={() => turnPage('next')} disabled={currentPage >= totalPages - 2 || !!flipStateRef.current}>▶</button>
          </div>
          <div style={{ textAlign: 'center', marginTop: isMaximized ? '0.3rem' : '1rem', padding: isMaximized ? '0 20px 8px' : 0, color: isMaximized ? '#999' : (darkMode ? '#aaa' : '#666') }}>
            <p style={{ fontSize: 13, marginBottom: 6, fontFamily: 'EB Garamond, serif' }}>Pages {li + 1}–{Math.min(ri + 1, totalPages)} of {totalPages}</p>
            <input type="range" min="0" max={Math.max(0, totalPages - 2)} step="2" value={currentPage} onChange={e => { if (!flipStateRef.current) { setCurrentPage(+e.target.value); } }} style={{ width: isMaximized ? '50%' : 'clamp(150px, 60%, 280px)', cursor: 'pointer', accentColor: '#8B4513' }} />
          </div>
        </div>
      );
    }

    // ==================== MAIN DIARY ====================
    function DigitalDiary() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [authError, setAuthError] = useState('');
      const [entries, setEntries] = useState([]);
      const [currentPage, setCurrentPage] = useState('view');
      const [newEntry, setNewEntry] = useState('');
      const [entryMood, setEntryMood] = useState('neutral');
      const [searchQuery, setSearchQuery] = useState('');
      const [darkMode, setDarkMode] = useState(false);
      const [selectedEntry, setSelectedEntry] = useState(null);
      const [syncing, setSyncing] = useState(null);
      const [entriesLoading, setEntriesLoading] = useState(true);

      useEffect(() => { const unsub = auth.onAuthStateChanged(u => { setUser(u); setAuthLoading(false); }); return () => unsub(); }, []);

      const firestore = user ? useFirestore(user.uid) : null;

      useEffect(() => { if (user && firestore) { (async () => { setEntriesLoading(true); try { setEntries(await firestore.loadEntries()); } catch(e) { console.error(e); } setEntriesLoading(false); })(); } }, [user]);

      const handleAuth = async () => {
        setAuthError('');
        if (!email || !password) { setAuthError('Please enter email and password'); return; }
        if (password.length < 6) { setAuthError('Password must be at least 6 characters'); return; }
        try {
          if (isSignUp) await auth.createUserWithEmailAndPassword(email, password);
          else await auth.signInWithEmailAndPassword(email, password);
        } catch (e) {
          const msgs = { 'auth/email-already-in-use': 'Email already registered. Try logging in.', 'auth/invalid-email': 'Invalid email.', 'auth/wrong-password': 'Wrong password.', 'auth/user-not-found': 'No account found. Sign up first.', 'auth/weak-password': 'Password must be at least 6 characters.', 'auth/invalid-credential': 'Invalid email or password.' };
          setAuthError(msgs[e.code] || e.message);
        }
      };

      const handleLogout = async () => { await auth.signOut(); setEntries([]); };

      const saveEntry = async () => {
        if (!newEntry.trim()) { alert('Please write something'); return; }
        const entry = { content: newEntry, mood: entryMood, date: new Date().toLocaleString() };
        setSyncing('syncing');
        try { const id = await firestore.saveEntry(entry); setEntries([{ id, ...entry }, ...entries]); setNewEntry(''); setEntryMood('neutral'); setCurrentPage('view'); setSyncing('synced'); setTimeout(() => setSyncing(null), 2000); }
        catch (e) { console.error(e); setSyncing('error'); }
      };

      const deleteEntry = async (id) => {
        setSyncing('syncing');
        try { await firestore.deleteEntry(id); setEntries(entries.filter(e => e.id !== id)); setSelectedEntry(null); setSyncing('synced'); setTimeout(() => setSyncing(null), 2000); }
        catch (e) { console.error(e); setSyncing('error'); }
      };

      const filteredEntries = entries.filter(e => e.content.toLowerCase().includes(searchQuery.toLowerCase()));
      const moods = { happy: '😊', sad: '😔', excited: '🤩', calm: '😌', neutral: '😐', stressed: '😰' };
      const bgClass = darkMode ? 'dark-mode' : 'light-mode';

      // Loading
      if (authLoading) return <div className="light-mode" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><div style={{ textAlign: 'center' }}><div className="loading-spinner" style={{ borderColor: 'rgba(29,158,117,0.3)', borderTopColor: '#1D9E75', width: 50, height: 50, margin: '0 auto' }}></div><p style={{ marginTop: '1rem', color: '#888' }}>Loading diary...</p></div></div>;

      // Auth Screen
      if (!user) {
        return (
          <div className={bgClass} style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
            <div style={{ maxWidth: 400, width: '100%', background: darkMode ? '#2d2d2d' : '#ffffff', padding: '2.5rem', borderRadius: 16, boxShadow: '0 8px 32px rgba(0,0,0,0.1)' }}>
              <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                <h1 style={{ fontSize: '2rem', fontWeight: 600, marginBottom: '0.5rem', color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>📔 My Diary</h1>
                <p style={{ fontSize: 14, color: darkMode ? '#aaa' : '#888' }}>Your private space — synced across all devices ☁️</p>
              </div>
              {authError && <div style={{ padding: 10, marginBottom: '1rem', background: '#fee2e2', color: '#dc2626', borderRadius: 8, fontSize: 13, border: '1px solid #fecaca' }}>{authError}</div>}
              <div style={{ marginBottom: '1rem' }}>
                <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: 13, fontWeight: 500, color: darkMode ? '#ccc' : '#5f5e5a' }}>Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleAuth()} placeholder="your@email.com" style={{ width: '100%', padding: '10px 12px', borderRadius: 8, border: '0.5px solid ' + (darkMode ? '#555' : '#d3d1c7'), background: darkMode ? '#333' : '#f9f8f6', color: darkMode ? '#f5f5f5' : '#2c2c2a', fontSize: 14, boxSizing: 'border-box' }} />
              </div>
              <div style={{ marginBottom: '1.5rem' }}>
                <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: 13, fontWeight: 500, color: darkMode ? '#ccc' : '#5f5e5a' }}>Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleAuth()} placeholder="At least 6 characters" style={{ width: '100%', padding: '10px 12px', borderRadius: 8, border: '0.5px solid ' + (darkMode ? '#555' : '#d3d1c7'), background: darkMode ? '#333' : '#f9f8f6', color: darkMode ? '#f5f5f5' : '#2c2c2a', fontSize: 14, boxSizing: 'border-box' }} />
              </div>
              <button onClick={handleAuth} style={{ width: '100%', padding: 12, background: '#1D9E75', color: 'white', border: 'none', borderRadius: 8, fontSize: 14, fontWeight: 500, cursor: 'pointer', marginBottom: '1rem' }} onMouseOver={e => e.target.style.opacity = '0.9'} onMouseOut={e => e.target.style.opacity = '1'}>{isSignUp ? '🚀 Create Account' : '🔐 Login'}</button>
              <p style={{ textAlign: 'center', fontSize: 13, color: darkMode ? '#aaa' : '#888' }}>
                {isSignUp ? 'Already have an account? ' : "Don't have an account? "}
                <span onClick={() => { setIsSignUp(!isSignUp); setAuthError(''); }} style={{ color: '#1D9E75', cursor: 'pointer', fontWeight: 500 }}>{isSignUp ? 'Login' : 'Sign Up'}</span>
              </p>
              <button onClick={() => setDarkMode(!darkMode)} style={{ marginTop: '1.5rem', width: '100%', padding: 8, background: 'transparent', border: '0.5px solid ' + (darkMode ? '#555' : '#d3d1c7'), borderRadius: 6, fontSize: 13, color: darkMode ? '#ccc' : '#5f5e5a', cursor: 'pointer' }}>{darkMode ? '☀️ Light Mode' : '🌙 Dark Mode'}</button>
            </div>
          </div>
        );
      }

      // Main App
      return (
        <div className={bgClass} style={{ minHeight: '100vh', padding: '2rem' }}>
          <SyncIndicator status={syncing} />
          <div style={{ maxWidth: 950, margin: '0 auto', background: darkMode ? '#2d2d2d' : '#ffffff', borderRadius: 16, padding: '2rem', boxShadow: '0 8px 32px rgba(0,0,0,0.1)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem', paddingBottom: '1rem', borderBottom: '1px solid ' + (darkMode ? '#444' : '#e0ddd5') }}>
              <div>
                <h1 style={{ fontSize: '1.5rem', fontWeight: 600, color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>📔 My Diary</h1>
                <p style={{ fontSize: 11, color: darkMode ? '#888' : '#aaa', marginTop: 4 }}>☁️ {user.email}</p>
              </div>
              <div style={{ display: 'flex', gap: '0.5rem' }}>
                <button onClick={() => setDarkMode(!darkMode)} style={{ padding: '8px 12px', background: 'transparent', border: '0.5px solid ' + (darkMode ? '#555' : '#d3d1c7'), borderRadius: 6, fontSize: 13, cursor: 'pointer', color: darkMode ? '#ccc' : '#5f5e5a' }}>{darkMode ? '☀️' : '🌙'}</button>
                <button onClick={handleLogout} style={{ padding: '8px 12px', background: 'transparent', border: '0.5px solid ' + (darkMode ? '#555' : '#d3d1c7'), borderRadius: 6, fontSize: 13, cursor: 'pointer', color: darkMode ? '#ccc' : '#5f5e5a' }}>Logout</button>
              </div>
            </div>
            <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '2rem', borderBottom: '1px solid ' + (darkMode ? '#444' : '#e0ddd5'), flexWrap: 'wrap' }}>
              {[{k:'view',l:'📔 Entries',x:' ('+entries.length+')'},{k:'write',l:'✏️ Write'},{k:'books',l:'📚 Books'},{k:'draw',l:'🎨 Draw'}].map(t => (
                <button key={t.k} onClick={() => setCurrentPage(t.k)} style={{ padding: '12px 16px', background: 'transparent', border: 'none', borderBottom: currentPage === t.k ? '2px solid #1D9E75' : 'none', color: currentPage === t.k ? '#1D9E75' : (darkMode ? '#aaa' : '#888'), fontSize: 14, fontWeight: 500, cursor: 'pointer' }}>{t.l}{t.x || ''}</button>
              ))}
            </div>

            {currentPage === 'write' && (
              <div>
                <h2 style={{ fontSize: '1.25rem', marginBottom: '1.5rem', color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>Write New Entry</h2>
                <div style={{ marginBottom: '1.5rem' }}>
                  <label style={{ display: 'block', marginBottom: '0.75rem', fontSize: 13, fontWeight: 500, color: darkMode ? '#ccc' : '#5f5e5a' }}>How are you feeling?</label>
                  <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                    {Object.entries(moods).map(([m, e]) => <button key={m} onClick={() => setEntryMood(m)} style={{ padding: '8px 12px', background: entryMood === m ? '#1D9E75' : (darkMode ? '#333' : '#f9f8f6'), border: '0.5px solid ' + (entryMood === m ? '#1D9E75' : (darkMode ? '#555' : '#d3d1c7')), borderRadius: 6, fontSize: 16, cursor: 'pointer', color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>{e}</button>)}
                  </div>
                </div>
                <div style={{ marginBottom: '1.5rem' }}>
                  <label style={{ display: 'block', marginBottom: '0.75rem', fontSize: 13, fontWeight: 500, color: darkMode ? '#ccc' : '#5f5e5a' }}>What's on your mind? 📝</label>
                  <textarea value={newEntry} onChange={e => setNewEntry(e.target.value)} placeholder="Write your thoughts..." style={{ width: '100%', minHeight: 300, padding: 12, borderRadius: 8, border: '0.5px solid ' + (darkMode ? '#555' : '#d3d1c7'), background: darkMode ? '#333' : '#f9f8f6', color: darkMode ? '#f5f5f5' : '#2c2c2a', fontSize: 14, fontFamily: 'system-ui, sans-serif', boxSizing: 'border-box', resize: 'vertical' }} />
                </div>
                <div style={{ display: 'flex', gap: '1rem' }}>
                  <button onClick={saveEntry} style={{ flex: 1, padding: 12, background: '#1D9E75', color: 'white', border: 'none', borderRadius: 8, fontSize: 14, fontWeight: 500, cursor: 'pointer' }}>☁️ Save Entry</button>
                  <button onClick={() => { setNewEntry(''); setEntryMood('neutral'); setCurrentPage('view'); }} style={{ padding: '12px 24px', background: 'transparent', border: '0.5px solid ' + (darkMode ? '#555' : '#d3d1c7'), borderRadius: 8, fontSize: 14, cursor: 'pointer', color: darkMode ? '#ccc' : '#5f5e5a' }}>Cancel</button>
                </div>
              </div>
            )}

            {currentPage === 'view' && (
              <>
                <div style={{ marginBottom: '1.5rem' }}>
                  <input type="text" placeholder="🔍 Search entries..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} style={{ width: '100%', padding: '10px 12px', borderRadius: 8, border: '0.5px solid ' + (darkMode ? '#555' : '#d3d1c7'), background: darkMode ? '#2d2d2d' : '#fff', color: darkMode ? '#f5f5f5' : '#2c2c2a', fontSize: 14, boxSizing: 'border-box' }} />
                </div>
                {entriesLoading ? <div style={{ textAlign: 'center', padding: '3rem' }}><div className="loading-spinner" style={{ borderColor: 'rgba(29,158,117,0.3)', borderTopColor: '#1D9E75', width: 40, height: 40 }}></div><p style={{ marginTop: '1rem', color: darkMode ? '#aaa' : '#888' }}>Loading entries...</p></div>
                : selectedEntry ? (
                  <div style={{ background: darkMode ? '#2d2d2d' : '#fff', padding: '2rem', borderRadius: 12, border: '0.5px solid ' + (darkMode ? '#444' : '#e0ddd5') }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '1.5rem' }}>
                      <div><p style={{ fontSize: 12, color: darkMode ? '#aaa' : '#888', margin: 0 }}>{selectedEntry.date}</p><p style={{ fontSize: 20, margin: '0.5rem 0 0' }}>{moods[selectedEntry.mood]}</p></div>
                      <button onClick={() => setSelectedEntry(null)} style={{ padding: '6px 12px', background: 'transparent', border: '0.5px solid ' + (darkMode ? '#555' : '#d3d1c7'), borderRadius: 6, fontSize: 13, cursor: 'pointer', color: darkMode ? '#ccc' : '#5f5e5a' }}>← Back</button>
                    </div>
                    <p style={{ fontSize: 14, lineHeight: '1.7', whiteSpace: 'pre-wrap', marginBottom: '1.5rem', color: darkMode ? '#ddd' : '#444' }}>{selectedEntry.content}</p>
                    <button onClick={() => { if (confirm('Delete this entry?')) deleteEntry(selectedEntry.id); }} style={{ padding: '8px 16px', background: '#e24b4a', color: 'white', border: 'none', borderRadius: 6, fontSize: 13, cursor: 'pointer' }}>🗑️ Delete Entry</button>
                  </div>
                ) : (
                  filteredEntries.length === 0 ? (
                    <div style={{ textAlign: 'center', padding: '3rem 2rem', color: darkMode ? '#aaa' : '#888' }}>
                      <p style={{ fontSize: 48, marginBottom: '1rem' }}>📝</p>
                      <p style={{ marginBottom: '1rem' }}>No entries yet. Start writing!</p>
                      <button onClick={() => setCurrentPage('write')} style={{ marginTop: '1rem', padding: '10px 20px', background: '#1D9E75', color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontSize: 14 }}>Write Your First Entry</button>
                    </div>
                  ) : (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                      {filteredEntries.map(entry => (
                        <div key={entry.id} onClick={() => setSelectedEntry(entry)} style={{ background: darkMode ? '#333' : '#faf8f3', padding: '1.5rem', borderRadius: 8, border: '0.5px solid ' + (darkMode ? '#444' : '#e0ddd5'), cursor: 'pointer', transition: 'all 0.2s' }}
                          onMouseOver={e => { e.currentTarget.style.borderColor = '#1D9E75'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
                          onMouseOut={e => { e.currentTarget.style.borderColor = darkMode ? '#444' : '#e0ddd5'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '0.75rem' }}>
                            <div><p style={{ fontSize: 12, color: darkMode ? '#aaa' : '#888', margin: 0 }}>{entry.date}</p><p style={{ fontSize: 18, margin: '0.5rem 0 0' }}>{moods[entry.mood]}</p></div>
                            <p style={{ fontSize: 12, color: darkMode ? '#888' : '#aaa', margin: 0 }}>{Math.max(1, Math.ceil(entry.content.length / 200))} min read</p>
                          </div>
                          <p style={{ fontSize: 14, lineHeight: '1.6', color: darkMode ? '#bbb' : '#555', margin: 0, overflow: 'hidden', textOverflow: 'ellipsis', display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical' }}>{entry.content}</p>
                        </div>
                      ))}
                    </div>
                  )
                )}
              </>
            )}

            {currentPage === 'books' && <BookReader darkMode={darkMode} userId={user.uid} />}
            {currentPage === 'draw' && <DrawingCanvas darkMode={darkMode} userId={user.uid} />}
          </div>
          <p style={{ textAlign: 'center', marginTop: '2rem', fontSize: 12, color: darkMode ? '#666' : '#aaa' }}>☁️ Your data is synced across all devices via Firebase. 🔒</p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DigitalDiary />);
  </script>
</body>
</html>
