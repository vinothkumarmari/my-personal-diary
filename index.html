<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal Diary</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Source+Serif+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .light-mode {
      background: linear-gradient(135deg, #f5f3ef 0%, #e8e4dd 100%);
      color: #2c2c2a;
    }
    .dark-mode {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #f5f5f5;
    }
    
    /* Book Reader Styles */
    .book-container {
      perspective: 2000px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 500px;
    }
    
    .book {
      position: relative;
      width: 700px;
      height: 500px;
      transform-style: preserve-3d;
      display: flex;
      background: linear-gradient(90deg, #f5f0e6 0%, #fff9f0 50%, #f5f0e6 100%);
      border-radius: 0 8px 8px 0;
      box-shadow: 
        -5px 5px 15px rgba(0,0,0,0.3),
        inset 0 0 50px rgba(0,0,0,0.05);
    }
    
    .book::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 30px;
      height: 100%;
      background: linear-gradient(90deg, 
        #8B4513 0%, 
        #A0522D 30%, 
        #8B4513 50%,
        #654321 100%);
      border-radius: 3px 0 0 3px;
      box-shadow: inset -2px 0 5px rgba(0,0,0,0.3);
    }
    
    .page-left, .page-right {
      width: 50%;
      height: 100%;
      padding: 40px 30px 40px 50px;
      overflow-y: auto;
      position: relative;
      background: linear-gradient(to right, #f8f4eb, #fffdf7);
    }
    
    .page-right {
      padding: 40px 50px 40px 30px;
      background: linear-gradient(to left, #f8f4eb, #fffdf7);
      border-left: 1px solid rgba(0,0,0,0.1);
      box-shadow: inset 5px 0 15px rgba(0,0,0,0.05);
    }
    
    .page-left::before, .page-right::before {
      content: '';
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        transparent,
        transparent 28px,
        rgba(0,0,0,0.02) 28px,
        rgba(0,0,0,0.02) 29px
      );
      pointer-events: none;
    }
    
    .page-number {
      position: absolute;
      bottom: 15px;
      font-size: 12px;
      color: #8B7355;
      font-style: italic;
    }
    
    .page-left .page-number { left: 50px; }
    .page-right .page-number { right: 50px; }
    
    .page-turn-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 80px;
      background: rgba(139, 69, 19, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #8B4513;
      transition: all 0.3s;
      border-radius: 4px;
    }
    
    .page-turn-btn:hover {
      background: rgba(139, 69, 19, 0.2);
    }
    
    .page-turn-btn.prev { left: -60px; }
    .page-turn-btn.next { right: -60px; }
    
    @keyframes pageFlipRight {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(-180deg); }
    }
    
    @keyframes pageFlipLeft {
      0% { transform: rotateY(-180deg); }
      100% { transform: rotateY(0deg); }
    }
    
    .page-flipping {
      animation: pageFlipRight 0.6s ease-in-out;
    }
    
    /* Drawing Canvas Styles */
    .drawing-canvas-container {
      position: relative;
      border: 2px solid #d3d1c7;
      border-radius: 12px;
      overflow: hidden;
      background: white;
    }
    
    .drawing-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 15px;
      background: rgba(0,0,0,0.03);
      border-bottom: 1px solid #e0ddd5;
      align-items: center;
    }
    
    .color-picker-container {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .color-swatch:hover {
      transform: scale(1.1);
    }
    
    .color-swatch.active {
      border-color: #333;
      box-shadow: 0 0 0 2px white, 0 0 0 4px #1D9E75;
    }
    
    .brush-size-slider {
      width: 100px;
    }
    
    .saved-drawings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    
    .saved-drawing-item {
      border: 1px solid #e0ddd5;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .saved-drawing-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .saved-drawing-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // Set PDF.js worker
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    // ==================== DRAWING COMPONENT ====================
    function DrawingCanvas({ darkMode }) {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [brushColor, setBrushColor] = useState('#000000');
      const [brushSize, setBrushSize] = useState(5);
      const [tool, setTool] = useState('brush'); // brush, eraser
      const [drawings, setDrawings] = useState([]);
      const [currentDrawingName, setCurrentDrawingName] = useState('');
      const [showSaved, setShowSaved] = useState(false);

      const colors = ['#000000', '#e24b4a', '#1D9E75', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899', '#6b7280', '#ffffff'];

      useEffect(() => {
        const saved = localStorage.getItem('diary_drawings');
        if (saved) setDrawings(JSON.parse(saved));
        
        const canvas = canvasRef.current;
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
      }, []);

      const startDrawing = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
        const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
        
        const ctx = canvas.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(x, y);
        setIsDrawing(true);
      };

      const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
        const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
        
        const ctx = canvas.getContext('2d');
        ctx.lineTo(x, y);
        ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : brushColor;
        ctx.lineWidth = tool === 'eraser' ? brushSize * 3 : brushSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
      };

      const stopDrawing = () => {
        setIsDrawing(false);
      };

      const clearCanvas = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      };

      const saveDrawing = () => {
        const name = currentDrawingName.trim() || `Drawing ${drawings.length + 1}`;
        const canvas = canvasRef.current;
        const imageData = canvas.toDataURL('image/png');
        
        const newDrawing = {
          id: Date.now(),
          name,
          image: imageData,
          date: new Date().toLocaleString()
        };
        
        const updated = [newDrawing, ...drawings];
        setDrawings(updated);
        localStorage.setItem('diary_drawings', JSON.stringify(updated));
        setCurrentDrawingName('');
        alert('Drawing saved! ✨');
      };

      const loadDrawing = (drawing) => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
        };
        img.src = drawing.image;
        setShowSaved(false);
      };

      const deleteDrawing = (id) => {
        const updated = drawings.filter(d => d.id !== id);
        setDrawings(updated);
        localStorage.setItem('diary_drawings', JSON.stringify(updated));
      };

      const downloadDrawing = () => {
        const canvas = canvasRef.current;
        const link = document.createElement('a');
        link.download = `${currentDrawingName || 'my-drawing'}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
            <h2 style={{ fontSize: '1.25rem', color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>
              🎨 Drawing Pad
            </h2>
            <button
              onClick={() => setShowSaved(!showSaved)}
              style={{
                padding: '8px 16px',
                background: showSaved ? '#1D9E75' : 'transparent',
                color: showSaved ? 'white' : (darkMode ? '#ccc' : '#5f5e5a'),
                border: `1px solid ${showSaved ? '#1D9E75' : (darkMode ? '#555' : '#d3d1c7')}`,
                borderRadius: '6px',
                cursor: 'pointer',
                fontSize: '13px'
              }}
            >
              {showSaved ? '✏️ Draw' : '📁 Saved (' + drawings.length + ')'}
            </button>
          </div>

          {showSaved ? (
            <div>
              {drawings.length === 0 ? (
                <div style={{ textAlign: 'center', padding: '3rem', color: darkMode ? '#aaa' : '#888' }}>
                  <p style={{ fontSize: '48px', marginBottom: '1rem' }}>🎨</p>
                  <p>No saved drawings yet. Start creating!</p>
                </div>
              ) : (
                <div className="saved-drawings-grid">
                  {drawings.map(drawing => (
                    <div key={drawing.id} className="saved-drawing-item" style={{ background: darkMode ? '#333' : '#fff' }}>
                      <img src={drawing.image} alt={drawing.name} onClick={() => loadDrawing(drawing)} />
                      <div style={{ padding: '10px' }}>
                        <p style={{ fontSize: '13px', fontWeight: '500', color: darkMode ? '#f5f5f5' : '#2c2c2a', marginBottom: '4px' }}>
                          {drawing.name}
                        </p>
                        <p style={{ fontSize: '11px', color: darkMode ? '#888' : '#aaa', marginBottom: '8px' }}>
                          {drawing.date}
                        </p>
                        <button
                          onClick={() => deleteDrawing(drawing.id)}
                          style={{
                            padding: '4px 8px',
                            background: '#e24b4a',
                            color: 'white',
                            border: 'none',
                            borderRadius: '4px',
                            fontSize: '11px',
                            cursor: 'pointer'
                          }}
                        >
                          Delete
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ) : (
            <div className="drawing-canvas-container">
              <div className="drawing-toolbar" style={{ background: darkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)' }}>
                <div className="color-picker-container">
                  {colors.map(color => (
                    <div
                      key={color}
                      className={`color-swatch ${brushColor === color && tool === 'brush' ? 'active' : ''}`}
                      style={{ backgroundColor: color, border: color === '#ffffff' ? '1px solid #ccc' : 'none' }}
                      onClick={() => { setBrushColor(color); setTool('brush'); }}
                    />
                  ))}
                  <input
                    type="color"
                    value={brushColor}
                    onChange={(e) => { setBrushColor(e.target.value); setTool('brush'); }}
                    style={{ width: '28px', height: '28px', border: 'none', cursor: 'pointer' }}
                  />
                </div>

                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <span style={{ fontSize: '12px', color: darkMode ? '#ccc' : '#666' }}>Size:</span>
                  <input
                    type="range"
                    min="1"
                    max="30"
                    value={brushSize}
                    onChange={(e) => setBrushSize(parseInt(e.target.value))}
                    className="brush-size-slider"
                  />
                  <span style={{ fontSize: '12px', color: darkMode ? '#ccc' : '#666', minWidth: '20px' }}>{brushSize}</span>
                </div>

                <button
                  onClick={() => setTool('brush')}
                  style={{
                    padding: '6px 12px',
                    background: tool === 'brush' ? '#1D9E75' : (darkMode ? '#444' : '#f0f0f0'),
                    color: tool === 'brush' ? 'white' : (darkMode ? '#ccc' : '#333'),
                    border: 'none',
                    borderRadius: '4px',
                    cursor: 'pointer',
                    fontSize: '13px'
                  }}
                >
                  ✏️ Brush
                </button>

                <button
                  onClick={() => setTool('eraser')}
                  style={{
                    padding: '6px 12px',
                    background: tool === 'eraser' ? '#1D9E75' : (darkMode ? '#444' : '#f0f0f0'),
                    color: tool === 'eraser' ? 'white' : (darkMode ? '#ccc' : '#333'),
                    border: 'none',
                    borderRadius: '4px',
                    cursor: 'pointer',
                    fontSize: '13px'
                  }}
                >
                  🧹 Eraser
                </button>

                <button
                  onClick={clearCanvas}
                  style={{
                    padding: '6px 12px',
                    background: darkMode ? '#444' : '#f0f0f0',
                    color: darkMode ? '#ccc' : '#333',
                    border: 'none',
                    borderRadius: '4px',
                    cursor: 'pointer',
                    fontSize: '13px'
                  }}
                >
                  🗑️ Clear
                </button>
              </div>

              <canvas
                ref={canvasRef}
                width={760}
                height={450}
                style={{ display: 'block', cursor: tool === 'eraser' ? 'cell' : 'crosshair' }}
                onMouseDown={startDrawing}
                onMouseMove={draw}
                onMouseUp={stopDrawing}
                onMouseLeave={stopDrawing}
                onTouchStart={startDrawing}
                onTouchMove={draw}
                onTouchEnd={stopDrawing}
              />

              <div style={{ 
                padding: '15px', 
                display: 'flex', 
                gap: '10px', 
                alignItems: 'center',
                background: darkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.03)',
                borderTop: `1px solid ${darkMode ? '#444' : '#e0ddd5'}`
              }}>
                <input
                  type="text"
                  placeholder="Drawing name..."
                  value={currentDrawingName}
                  onChange={(e) => setCurrentDrawingName(e.target.value)}
                  style={{
                    flex: 1,
                    padding: '8px 12px',
                    border: `1px solid ${darkMode ? '#555' : '#d3d1c7'}`,
                    borderRadius: '6px',
                    background: darkMode ? '#333' : '#fff',
                    color: darkMode ? '#f5f5f5' : '#2c2c2a',
                    fontSize: '14px'
                  }}
                />
                <button
                  onClick={saveDrawing}
                  style={{
                    padding: '8px 20px',
                    background: '#1D9E75',
                    color: 'white',
                    border: 'none',
                    borderRadius: '6px',
                    cursor: 'pointer',
                    fontSize: '14px',
                    fontWeight: '500'
                  }}
                >
                  💾 Save
                </button>
                <button
                  onClick={downloadDrawing}
                  style={{
                    padding: '8px 16px',
                    background: darkMode ? '#444' : '#f0f0f0',
                    color: darkMode ? '#ccc' : '#333',
                    border: 'none',
                    borderRadius: '6px',
                    cursor: 'pointer',
                    fontSize: '14px'
                  }}
                >
                  ⬇️ Download
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==================== BOOK READER COMPONENT ====================
    function BookReader({ darkMode }) {
      const [books, setBooks] = useState([]);
      const [currentBook, setCurrentBook] = useState(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [totalPages, setTotalPages] = useState(0);
      const [pdfDoc, setPdfDoc] = useState(null);
      const [pageTexts, setPageTexts] = useState([]);
      const [fontFamily, setFontFamily] = useState('Merriweather');
      const [fontSize, setFontSize] = useState(16);
      const [isFlipping, setIsFlipping] = useState(false);
      const [flipDirection, setFlipDirection] = useState('');
      const fileInputRef = useRef(null);

      const fonts = [
        { name: 'Merriweather', label: 'Merriweather' },
        { name: 'Crimson Text', label: 'Crimson Text' },
        { name: 'Libre Baskerville', label: 'Libre Baskerville' },
        { name: 'EB Garamond', label: 'EB Garamond' },
        { name: 'Lora', label: 'Lora' },
        { name: 'Source Serif Pro', label: 'Source Serif' },
        { name: 'Georgia', label: 'Georgia' },
        { name: 'Times New Roman', label: 'Times New Roman' }
      ];

      useEffect(() => {
        const saved = localStorage.getItem('diary_books');
        if (saved) setBooks(JSON.parse(saved));
      }, []);

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') {
          alert('Please select a PDF file');
          return;
        }

        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            const typedArray = new Uint8Array(event.target.result);
            const pdf = await window.pdfjsLib.getDocument(typedArray).promise;
            
            // Extract text from all pages
            const texts = [];
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const textContent = await page.getTextContent();
              const text = textContent.items.map(item => item.str).join(' ');
              texts.push(text);
            }

            const bookData = {
              id: Date.now(),
              name: file.name.replace('.pdf', ''),
              totalPages: pdf.numPages,
              texts: texts,
              lastPage: 0,
              addedDate: new Date().toLocaleString()
            };

            const updated = [bookData, ...books];
            setBooks(updated);
            localStorage.setItem('diary_books', JSON.stringify(updated));
            
            // Open the book
            openBook(bookData);
          } catch (error) {
            console.error('Error loading PDF:', error);
            alert('Error loading PDF. Please try another file.');
          }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = '';
      };

      const openBook = (book) => {
        setCurrentBook(book);
        setPageTexts(book.texts);
        setTotalPages(book.totalPages);
        setCurrentPage(book.lastPage || 0);
      };

      const closeBook = () => {
        // Save reading progress
        if (currentBook) {
          const updated = books.map(b => 
            b.id === currentBook.id ? { ...b, lastPage: currentPage } : b
          );
          setBooks(updated);
          localStorage.setItem('diary_books', JSON.stringify(updated));
        }
        setCurrentBook(null);
        setPageTexts([]);
      };

      const deleteBook = (id) => {
        const updated = books.filter(b => b.id !== id);
        setBooks(updated);
        localStorage.setItem('diary_books', JSON.stringify(updated));
      };

      const turnPage = (direction) => {
        if (isFlipping) return;
        
        if (direction === 'next' && currentPage < totalPages - 2) {
          setFlipDirection('next');
          setIsFlipping(true);
          setTimeout(() => {
            setCurrentPage(prev => Math.min(prev + 2, totalPages - 1));
            setIsFlipping(false);
          }, 400);
        } else if (direction === 'prev' && currentPage > 0) {
          setFlipDirection('prev');
          setIsFlipping(true);
          setTimeout(() => {
            setCurrentPage(prev => Math.max(prev - 2, 0));
            setIsFlipping(false);
          }, 400);
        }
      };

      // Book Library View
      if (!currentBook) {
        return (
          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
              <h2 style={{ fontSize: '1.25rem', color: darkMode ? '#f5f5f5' : '#2c2c2a' }}>
                📚 My Book Library
              </h2>
              <button
                onClick={() => fileInputRef.current?.click()}
                style={{
                  padding: '10px 20px',
                  background: '#1D9E75',
                  color: 'white',
                  border: 'none',
                  borderRadius: '8px',
                  cursor: 'pointer',
                  fontSize: '14px',
                  fontWeight: '500'
                }}
              >
                📄 Import PDF Book
              </button>
              <input
                ref={fileInputRef}
                type="file"
                accept=".pdf"
                onChange={handleFileUpload}
                style={{ display: 'none' }}
              />
            </div>

            {books.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '3rem', color: darkMode ? '#aaa' : '#888' }}>
                <p style={{ fontSize: '64px', marginBottom: '1rem' }}>📚</p>
                <p style={{ fontSize: '16px', marginBottom: '0.5rem' }}>Your library is empty</p>
                <p style={{ fontSize: '14px' }}>Import a PDF book to start reading!</p>
              </div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: '1.5rem' }}>
                {books.map(book => (
                  <div
                    key={book.id}
                    style={{
                      background: darkMode ? '#333' : '#fff',
                      borderRadius: '12px',
                      overflow: 'hidden',
                      border: `1px solid ${darkMode ? '#444' : '#e0ddd5'}`,
                      transition: 'all 0.2s',
                      cursor: 'pointer'
                    }}
                    onMouseOver={(e) => {
                      e.currentTarget.style.transform = 'translateY(-4px)';
                      e.currentTarget.style.boxShadow = '0 8px 25px rgba(0,0,0,0.15)';
                    }}
                    onMouseOut={(e) => {
                      e.currentTarget.style.transform = 'translateY(0)';
                      e.currentTarget.style.boxShadow = 'none';
                    }}

                  height: '30px',
                  background: darkMode ? '#444' : '#f0f0f0',

                  border: 'none',
                  borderRadius: '4px',
                  cursor: 'pointer',
                  fontSize: '16px'

                A+

          </div>

          {/* Book */}
          <div className="book-container">

              <div className="page-right" style={{
                opacity: isFlipping && flipDirection === 'next' ? 0.7 : 1,
                transition: 'opacity 0.3s'
              }}>
                <div style={{
                  fontFamily: fontFamily,
                  fontSize: `${fontSize}px`,
                  lineHeight: '1.8',
                  color: '#333',
                  textAlign: 'justify',
                  hyphens: 'auto'
                }}>
                  {rightPageText || (
                    rightPageIndex < totalPages ? (
                      <p style={{ color: '#888', fontStyle: 'italic', textAlign: 'center', marginTop: '40%' }}>

                      </p>

                      <p style={{ color: '#888', fontStyle: 'italic', textAlign: 'center', marginTop: '40%' }}>
                        ✨ The End ✨
                      </p>

                </div>
                <span className="page-number">{rightPageIndex + 1}</span>
              </div>

              {/* Page Turn Buttons */}
              <button
                className="page-turn-btn prev"
                onClick={() => turnPage('prev')}
                disabled={currentPage === 0}
                style={{ opacity: currentPage === 0 ? 0.3 : 1 }}
              >
                ◀
              </button>
              <button
                className="page-turn-btn next"
                onClick={() => turnPage('next')}

                style={{ opacity: currentPage >= totalPages - 2 ? 0.3 : 1 }}

                ▶
              </button>
            </div>
          </div>

          {/* Page Navigation */}
          <div style={{
            textAlign: 'center',
            marginTop: '1.5rem',
            color: darkMode ? '#aaa' : '#666'
          }}>
            <p style={{ fontSize: '14px', marginBottom: '10px' }}>
              Pages {leftPageIndex + 1}-{Math.min(rightPageIndex + 1, totalPages)} of {totalPages}

            <input
              type="range"
              min="0"
              max={Math.max(0, totalPages - 2)}
              step="2"
              value={currentPage}
              onChange={(e) => setCurrentPage(parseInt(e.target.value))}
              style={{ width: '300px', cursor: 'pointer' }}
            />
          </div>
        </div>
      );
    }

    // ==================== MAIN DIARY COMPONENT ====================
    function DigitalDiary() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [password, setPassword] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [isFirstTime, setIsFirstTime] = useState(true);
      const [entries, setEntries] = useState([]);
      const [currentPage, setCurrentPage] = useState('view');
      const [newEntry, setNewEntry] = useState('');
      const [entryMood, setEntryMood] = useState('neutral');
      const [searchQuery, setSearchQuery] = useState('');
      const [darkMode, setDarkMode] = useState(false);
      const [selectedEntry, setSelectedEntry] = useState(null);

      useEffect(() => {
        const stored = localStorage.getItem('diary_data');
        const hasPassword = localStorage.getItem('diary_password');
        if (stored) {
          setEntries(JSON.parse(stored));
          setIsFirstTime(false);
        }
        if (hasPassword) {
          setIsFirstTime(false);
        }
      }, []);

      const handleSetPassword = () => {
        if (!password || password.length < 4) {
          alert('Please enter a password (at least 4 characters)');
          return;
        }
        localStorage.setItem('diary_password', password);
        setIsLoggedIn(true);
        setPassword('');
      };

      const handleLogin = () => {
        const storedPassword = localStorage.getItem('diary_password');
        if (loginPassword === storedPassword) {
          setIsLoggedIn(true);
          setLoginPassword('');
        } else {
          alert('Wrong password');
        }
      };

      const saveEntry = () => {
        if (!newEntry.trim()) {
          alert('Please write something');
          return;
        }
        const entry = {
          id: Date.now(),
          content: newEntry,
          mood: entryMood,
          date: new Date().toLocaleString(),
        };
        const updated = [entry, ...entries];
        setEntries(updated);
        localStorage.setItem('diary_data', JSON.stringify(updated));
        setNewEntry('');
        setEntryMood('neutral');
        setCurrentPage('view');
      };

      const deleteEntry = (id) => {
        const updated = entries.filter(e => e.id !== id);
        setEntries(updated);
        localStorage.setItem('diary_data', JSON.stringify(updated));
        setSelectedEntry(null);
      };

      const filteredEntries = entries.filter(e =>
        e.content.toLowerCase().includes(searchQuery.toLowerCase())
      );

      const moods = {
        happy: '😊',
        sad: '😔',
        excited: '🤩',
        calm: '😌',
        neutral: '😐',
        stressed: '😰'
      };

      const bgClass = darkMode ? 'dark-mode' : 'light-mode';

      if (!isLoggedIn) {
        return (
          <div className={bgClass} style={{
            minHeight: '100vh',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            padding: '2rem'

              background: darkMode ? '#2d2d2d' : '#ffffff',

              boxShadow: '0 8px 32px rgba(0,0,0,0.1)'

              <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                <h1 style={{
                  fontSize: '2rem',
                  fontWeight: '600',
                  marginBottom: '0.5rem',
                  color: darkMode ? '#f5f5f5' : '#2c2c2a'
                }}>
                  📔 My Diary
                </h1>
                <p style={{
                  fontSize: '14px',
                  color: darkMode ? '#aaa' : '#888'
                }}>
                  Your private space for reflection
                </p>
              </div>

              {isFirstTime ? (
                <div>
                  <label style={{
                    display: 'block',
                    marginBottom: '0.5rem',
                    fontSize: '13px',
                    fontWeight: '500',
                    color: darkMode ? '#ccc' : '#5f5e5a'
                  }}>
                    Create a password <span style={{ color: '#888' }}>••••••••••</span>
                  </label>
                  <input
                    type="password"
                    value={password}

                    style={{
                      width: '100%',
                      padding: '10px 12px',
                      borderRadius: '8px',

                  <button

                  <input

                  fontSize: '13px',
                  color: darkMode ? '#ccc' : '#5f5e5a',
                  cursor: 'pointer'

                {darkMode ? '☀️ Light Mode' : '🌙 Dark Mode'}

            </div>
          </div>
        );
      }

                {selectedEntry ? (
                  <div style={{
                    background: darkMode ? '#2d2d2d' : '#ffffff',
                    padding: '2rem',
                    borderRadius: '12px',
                    border: `0.5px solid ${darkMode ? '#444' : '#e0ddd5'}`
                  }}>
                    <div style={{
                      display: 'flex',
                      justifyContent: 'space-between',
                      alignItems: 'start',
                      marginBottom: '1.5rem'
                    }}>
                      <div>
                        <p style={{
                          fontSize: '12px',
                          color: darkMode ? '#aaa' : '#888',
                          margin: 0
                        }}>
                          {selectedEntry.date}
                        </p>
                        <p style={{ fontSize: '20px', margin: '0.5rem 0 0' }}>
                          {moods[selectedEntry.mood]}
                        </p>
                      </div>
                      <button
                        onClick={() => setSelectedEntry(null)}
                        style={{
                          padding: '6px 12px',
                          background: 'transparent',
                          border: `0.5px solid ${darkMode ? '#555' : '#d3d1c7'}`,
                          borderRadius: '6px',
                          fontSize: '13px',
                          cursor: 'pointer',
                          color: darkMode ? '#ccc' : '#5f5e5a'
                        }}
                      >
                        ← Back
                      </button>
                    </div>
                    <p style={{
                      fontSize: '14px',
                      lineHeight: '1.7',
                      whiteSpace: 'pre-wrap',
                      marginBottom: '1.5rem',
                      color: darkMode ? '#ddd' : '#444'
                    }}>
                      {selectedEntry.content}
                    </p>
                    <button
                      onClick={() => {
                        if (confirm('Are you sure you want to delete this entry?')) {
                          deleteEntry(selectedEntry.id);
                        }
                      }}
                      style={{
                        padding: '8px 16px',
                        background: '#e24b4a',
                        color: 'white',
                        border: 'none',
                        borderRadius: '6px',
                        fontSize: '13px',
                        cursor: 'pointer'
                      }}
                      onMouseOver={(e) => e.target.style.opacity = '0.9'}
                      onMouseOut={(e) => e.target.style.opacity = '1'}
                    >
                      🗑️ Delete Entry
                    </button>
                  </div>
                ) : (
                  <div>
                    {filteredEntries.length === 0 ? (
                      <div style={{
                        textAlign: 'center',
                        padding: '3rem 2rem',
                        color: darkMode ? '#aaa' : '#888'
                      }}>
                        <p style={{ fontSize: '48px', marginBottom: '1rem' }}>📝</p>
                        <p style={{ marginBottom: '1rem' }}>No entries yet. Start writing your thoughts!</p>
                        <button
                          onClick={() => setCurrentPage('write')}
                          style={{
                            marginTop: '1rem',
                            padding: '10px 20px',
                            background: '#1D9E75',
                            color: 'white',
                            border: 'none',
                            borderRadius: '6px',
                            cursor: 'pointer',
                            fontSize: '14px'
                          }}
                        >
                          Write Your First Entry
                        </button>
                      </div>
                    ) : (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                        {filteredEntries.map((entry) => (
                          <div
                            key={entry.id}
                            onClick={() => setSelectedEntry(entry)}
                            style={{
                              background: darkMode ? '#333' : '#faf8f3',
                              padding: '1.5rem',
                              borderRadius: '8px',
                              border: `0.5px solid ${darkMode ? '#444' : '#e0ddd5'}`,
                              cursor: 'pointer',
                              transition: 'all 0.2s'
                            }}
                            onMouseOver={(e) => {
                              e.currentTarget.style.borderColor = '#1D9E75';
                              e.currentTarget.style.transform = 'translateY(-2px)';
                            }}
                            onMouseOut={(e) => {
                              e.currentTarget.style.borderColor = darkMode ? '#444' : '#e0ddd5';
                              e.currentTarget.style.transform = 'translateY(0)';
                            }}
                          >
                            <div style={{
                              display: 'flex',
                              justifyContent: 'space-between',
                              alignItems: 'start',
                              marginBottom: '0.75rem'
                            }}>
                              <div>
                                <p style={{
                                  fontSize: '12px',
                                  color: darkMode ? '#aaa' : '#888',
                                  margin: 0
                                }}>
                                  {entry.date}
                                </p>
                                <p style={{ fontSize: '18px', margin: '0.5rem 0 0' }}>
                                  {moods[entry.mood]}
                                </p>
                              </div>
                              <p style={{
                                fontSize: '12px',
                                color: darkMode ? '#888' : '#aaa',
                                margin: 0
                              }}>
                                {Math.max(1, Math.ceil(entry.content.length / 200))} min read
                              </p>
                            </div>
                            <p style={{
                              fontSize: '14px',
                              lineHeight: '1.6',
                              color: darkMode ? '#bbb' : '#555',
                              margin: 0,
                              overflow: 'hidden',
                              textOverflow: 'ellipsis',
                              display: '-webkit-box',
                              WebkitLineClamp: 3,
                              WebkitBoxOrient: 'vertical'
                            }}>
                              {entry.content}
                            </p>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </>
            )}

            {currentPage === 'books' && (
              <BookReader darkMode={darkMode} />
            )}

            {currentPage === 'draw' && (
              <DrawingCanvas darkMode={darkMode} />
            )}
          </div>
          
          <p style={{
            textAlign: 'center',
            marginTop: '2rem',
            fontSize: '12px',
            color: darkMode ? '#666' : '#aaa'
          }}>
            Your data is stored locally in your browser. 🔒
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DigitalDiary />);
  </script>
</body>
</html>
